<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha - Preco Certo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c10;
      --card: #151821;
      --line: rgba(255,255,255,.12);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #fbbf24;
      --ok: #22c55e;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Inter, sans-serif;
      color: var(--text);
      background: radial-gradient(1100px 520px at 10% 0%, #1a1f2b 0%, #0b0c10 56%);
    }
    .card {
      width: 100%;
      max-width: 520px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      background: var(--card);
      box-shadow: 0 28px 70px rgba(0,0,0,.36);
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 800;
    }
    p {
      margin: 0 0 14px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--muted);
    }
    .status {
      min-height: 20px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }
    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }
    label {
      font-size: 13px;
      font-weight: 700;
      color: #e4e4e7;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      background: rgba(0,0,0,.26);
      color: var(--text);
      outline: none;
      font-size: 14px;
    }
    input:focus {
      border-color: rgba(251,191,36,.7);
      box-shadow: 0 0 0 3px rgba(251,191,36,.15);
    }
    .password-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .toggle-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,.04);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      min-height: 42px;
      padding: 10px 12px;
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .btn-primary {
      border-color: transparent;
      background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%);
      color: #111;
    }
    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    .error-box {
      border: 1px dashed rgba(239,68,68,.45);
      border-radius: 10px;
      background: rgba(239,68,68,.1);
      color: #fca5a5;
      font-size: 13px;
      padding: 10px;
      margin-bottom: 10px;
      display: none;
    }
    @media (max-width: 560px) {
      .actions { grid-template-columns: 1fr; }
    }
  </style>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <link rel="stylesheet" href="theme-unified.css">
</head>
<body>
  <main class="card">
    <h1>Redefinir senha</h1>
    <p>Defina uma nova senha para continuar acessando sua conta.</p>

    <div id="invalidBox" class="error-box"></div>
    <div id="status" class="status"></div>

    <form id="resetForm">
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" autocomplete="email" readonly>
      </div>

      <div class="field">
        <label for="newPassword">Nova senha</label>
        <div class="password-wrap">
          <input id="newPassword" type="password" placeholder="Nova senha (minimo 6 caracteres)" minlength="6" required>
          <button id="toggleNewPassword" class="toggle-btn" type="button">Ver</button>
        </div>
      </div>

      <div class="field">
        <label for="confirmPassword">Confirmar nova senha</label>
        <div class="password-wrap">
          <input id="confirmPassword" type="password" placeholder="Repita a nova senha" minlength="6" required>
          <button id="toggleConfirmPassword" class="toggle-btn" type="button">Ver</button>
        </div>
      </div>

      <div class="actions">
        <a class="btn" href="login.html">Voltar para login</a>
        <button id="btnReset" class="btn btn-primary" type="submit">Redefinir senha</button>
      </div>
    </form>

    <div class="hint">
      Se o link estiver expirado, volte ao login e solicite um novo e-mail de recuperacao.
    </div>
  </main>

  <script>
    (function () {
      const statusEl = document.getElementById('status');
      const invalidBox = document.getElementById('invalidBox');
      const form = document.getElementById('resetForm');
      const emailEl = document.getElementById('email');
      const newPasswordEl = document.getElementById('newPassword');
      const confirmPasswordEl = document.getElementById('confirmPassword');
      const btnReset = document.getElementById('btnReset');
      const params = new URLSearchParams(window.location.search || '');
      const email = (params.get('recover_email') || params.get('email') || '').trim();
      const code = (params.get('recover_code') || params.get('code') || '').trim();

      function setStatus(message, isError, isOk) {
        statusEl.textContent = message || '';
        statusEl.className = 'status' + (isError ? ' error' : '') + (isOk ? ' ok' : '');
      }

      function setInvalid(message) {
        invalidBox.textContent = message || '';
        invalidBox.style.display = message ? 'block' : 'none';
        if (message) form.style.display = 'none';
      }

      function setupToggle(buttonId, inputEl) {
        const btn = document.getElementById(buttonId);
        btn.addEventListener('click', function () {
          const show = inputEl.type === 'password';
          inputEl.type = show ? 'text' : 'password';
          btn.textContent = show ? 'Ocultar' : 'Ver';
        });
      }

      setupToggle('toggleNewPassword', newPasswordEl);
      setupToggle('toggleConfirmPassword', confirmPasswordEl);

      if (!email || !code) {
        setInvalid('Link de recuperacao invalido. Solicite um novo link na tela de login.');
        return;
      }

      emailEl.value = email;
      setStatus('Link validado. Defina sua nova senha.', false, true);

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const newPassword = newPasswordEl.value;
        const confirmPassword = confirmPasswordEl.value;

        if (!newPassword || !confirmPassword) {
          setStatus('Preencha a nova senha e a confirmacao.', true, false);
          return;
        }
        if (newPassword.length < 6) {
          setStatus('A nova senha deve ter no minimo 6 caracteres.', true, false);
          return;
        }
        if (newPassword !== confirmPassword) {
          setStatus('A confirmacao da senha nao confere.', true, false);
          return;
        }

        btnReset.disabled = true;
        setStatus('Redefinindo senha...');

        try {
          if (!window.authResetPasswordWithCode) throw new Error('Funcao de redefinicao nao disponivel.');
          const data = await window.authResetPasswordWithCode(email, code, newPassword);
          setStatus(data && data.message ? data.message : 'Senha redefinida com sucesso.', false, true);
          newPasswordEl.value = '';
          confirmPasswordEl.value = '';
          setTimeout(function () {
            window.location.replace('login.html?mode=signin');
          }, 900);
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao redefinir senha.', true, false);
        } finally {
          btnReset.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
