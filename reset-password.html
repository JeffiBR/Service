<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-slate-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha - One Pay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a'
            }
          }
        }
      }
    };
  </script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <link rel="stylesheet" href="login-theme.css">
  <link rel="icon" type="image/png" href="onepay-icon.png">
</head>
<body class="h-full bg-slate-950 text-slate-100">
  <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-sm text-center">
      <div class="mx-auto h-10 w-10 rounded-full bg-gradient-to-br from-brand-400 to-brand-600 shadow-[0_10px_30px_rgba(34,197,94,.4)]"></div>
      <h2 class="mt-10 text-center text-2xl font-bold tracking-tight text-white">Redefinir senha</h2>
      <p class="mt-2 text-sm text-slate-400">Defina uma nova senha para continuar acessando sua conta.</p>
    </div>

    <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
      <div class="rounded-xl border border-white/10 bg-white/5 backdrop-blur-sm p-6 shadow-2xl">
        <div id="invalidBox" class="hidden rounded-md border border-red-500/60 bg-red-500/10 px-3 py-2 text-xs text-red-300 mb-4"></div>
        <div id="status" class="min-h-5 text-xs font-semibold text-slate-400 mb-4"></div>

        <form id="resetForm" class="space-y-4">
          <div>
            <label for="email" class="block text-sm/6 font-medium text-slate-100">E-mail</label>
            <div class="mt-2">
              <input id="email" type="email" autocomplete="email" readonly class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-slate-300" />
            </div>
          </div>

          <div>
            <label for="newPassword" class="block text-sm/6 font-medium text-slate-100">Nova senha</label>
            <div class="mt-2 grid grid-cols-[1fr_auto] gap-2">
              <input id="newPassword" type="password" minlength="6" required placeholder="Nova senha (mínimo 6 caracteres)" class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              <button id="toggleNewPassword" type="button" class="rounded-md border border-white/15 bg-white/5 px-3 py-2 text-xs font-semibold text-slate-200 hover:bg-white/10">Ver</button>
            </div>
          </div>

          <div>
            <label for="confirmPassword" class="block text-sm/6 font-medium text-slate-100">Confirmar nova senha</label>
            <div class="mt-2 grid grid-cols-[1fr_auto] gap-2">
              <input id="confirmPassword" type="password" minlength="6" required placeholder="Repita a nova senha" class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              <button id="toggleConfirmPassword" type="button" class="rounded-md border border-white/15 bg-white/5 px-3 py-2 text-xs font-semibold text-slate-200 hover:bg-white/10">Ver</button>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
            <a href="login.html" class="flex w-full justify-center rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm font-semibold text-slate-100 hover:bg-white/10">Voltar para login</a>
            <button id="btnReset" type="submit" class="flex w-full justify-center rounded-md bg-brand-500 px-3 py-2 text-sm font-semibold text-white hover:bg-brand-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-500">Redefinir senha</button>
          </div>
        </form>

        <p class="mt-5 text-xs text-slate-400">Se o link estiver expirado, volte ao login e solicite um novo e-mail de recuperação.</p>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const statusEl = document.getElementById('status');
      const invalidBox = document.getElementById('invalidBox');
      const form = document.getElementById('resetForm');
      const emailEl = document.getElementById('email');
      const newPasswordEl = document.getElementById('newPassword');
      const confirmPasswordEl = document.getElementById('confirmPassword');
      const btnReset = document.getElementById('btnReset');
      const params = new URLSearchParams(window.location.search || '');
      const email = (params.get('recover_email') || params.get('email') || '').trim();
      const code = (params.get('recover_code') || params.get('code') || '').trim();

      function setStatus(message, isError, isOk) {
        statusEl.textContent = message || '';
        statusEl.className = 'min-h-5 text-xs font-semibold mb-4 ' + (isError ? 'text-red-400' : isOk ? 'text-green-400' : 'text-slate-400');
      }

      function setInvalid(message) {
        invalidBox.textContent = message || '';
        invalidBox.classList.toggle('hidden', !message);
        if (message) form.style.display = 'none';
      }

      function setupToggle(buttonId, inputEl) {
        const btn = document.getElementById(buttonId);
        btn.addEventListener('click', function () {
          const show = inputEl.type === 'password';
          inputEl.type = show ? 'text' : 'password';
          btn.textContent = show ? 'Ocultar' : 'Ver';
        });
      }

      setupToggle('toggleNewPassword', newPasswordEl);
      setupToggle('toggleConfirmPassword', confirmPasswordEl);

      if (!email || !code) {
        setInvalid('Link de recuperação inválido. Solicite um novo link na tela de login.');
        return;
      }

      emailEl.value = email;
      setStatus('Link validado. Defina sua nova senha.', false, true);

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const newPassword = newPasswordEl.value;
        const confirmPassword = confirmPasswordEl.value;

        if (!newPassword || !confirmPassword) {
          setStatus('Preencha a nova senha e a confirmação.', true, false);
          return;
        }
        if (newPassword.length < 6) {
          setStatus('A nova senha deve ter no mínimo 6 caracteres.', true, false);
          return;
        }
        if (newPassword !== confirmPassword) {
          setStatus('A confirmação da senha não confere.', true, false);
          return;
        }

        btnReset.disabled = true;
        setStatus('Redefinindo senha...');

        try {
          if (!window.authResetPasswordWithCode) throw new Error('Função de redefinição não disponível.');
          const data = await window.authResetPasswordWithCode(email, code, newPassword);
          setStatus(data && data.message ? data.message : 'Senha redefinida com sucesso.', false, true);
          newPasswordEl.value = '';
          confirmPasswordEl.value = '';
          setTimeout(function () {
            window.location.replace('login.html?mode=signin');
          }, 900);
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao redefinir senha.', true, false);
        } finally {
          btnReset.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
