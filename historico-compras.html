<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Compras - One Pay</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c10;
      --panel: #151821;
      --panel-soft: #10131c;
      --line: rgba(255,255,255,.12);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #fbbf24;
      --ok: #22c55e;
      --danger: #ef4444;
      --warn: #eab308;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: radial-gradient(1200px 650px at 10% 10%, #1a1f2b 0%, #0b0c10 56%);
      color: var(--text);
      min-height: 100vh;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px; background: rgba(10,10,11,.95); backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,.05); position: fixed; inset: 0 auto 0 0; display: flex; flex-direction: column; z-index: 100;
    }
    .sidebar-header { padding: 24px; border-bottom: 1px solid rgba(255,255,255,.05); }
    .brand { display:flex; gap:14px; align-items:center; }
    .brand-icon { width: 48px; height: 48px; border-radius: 14px; display:flex; align-items:center; justify-content:center; color: #111; font-size: 22px; background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); box-shadow: 0 0 32px rgba(251,191,36,.25); }
    .brand-name { font-size: 1.25rem; font-weight: 800; background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .brand-tag { font-size: .65rem; color: var(--muted); letter-spacing: .15em; text-transform: uppercase; font-weight: 600; }
    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-section-title {
      font-size: .65rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: 0 12px;
      margin-bottom: 8px;
      margin-top: 16px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 4px;
      transition: .2s ease;
      font-weight: 600;
      cursor: pointer;
    }
    .nav-item:hover {
      color: var(--text);
      background: rgba(255,255,255,.05);
    }
    .nav-item.active {
      color: #111;
      background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
      box-shadow: 0 0 28px rgba(251,191,36,.25);
    }
    .nav-item i { width: 20px; font-size: 1.1rem; }
    .nav-item span { font-size: .9rem; }
    .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,.05); }
    .server-status { display:flex; gap:12px; align-items:center; padding:12px; border: 1px solid rgba(255,255,255,.05); border-radius: 12px; background: rgba(255,255,255,.02); }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 12px var(--ok); }
    .status-info { font-size: .75rem; color: var(--muted); }
    .status-value { font-size: .85rem; font-weight: 700; color: var(--text); }

    .main { flex: 1; margin-left: 260px; padding: 24px; }
    .container { max-width: 1240px; margin: 0 auto; }
    .header { margin-bottom: 16px; padding-right: 300px; }
    .title { margin: 0; font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; }
    .subtitle { margin-top: 6px; color: var(--muted); }
    .status-box {
      min-height: 44px; border: 1px solid var(--line); border-radius: 10px; display:flex; align-items:center;
      padding: 0 12px; margin-bottom: 14px; color: #d1d5db; background: rgba(255,255,255,.02);
    }
    .status-box.ok { border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.09); color: #86efac; }
    .status-box.error { border-color: rgba(239,68,68,.35); background: rgba(239,68,68,.09); color: #fca5a5; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .stat-label { color: var(--muted); font-size: .78rem; margin-bottom: 4px; }
    .stat-value { font-size: 1.35rem; font-weight: 800; }

    .card { border: 1px solid var(--line); border-radius: 12px; background: var(--panel); overflow: hidden; box-shadow: 0 10px 26px rgba(0,0,0,.24); }
    .card-head { padding: 14px 16px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.02); display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .card-title { margin: 0; font-size: 1rem; font-weight: 700; }
    .card-body { padding: 14px 16px; background: var(--panel-soft); }
    .tools { display: grid; grid-template-columns: 1fr 190px 160px auto; gap: 10px; margin-bottom: 12px; align-items: center; }
    .count { color: var(--muted); font-size: .85rem; text-align: right; }

    input, select {
      width: 100%; border: 1px solid var(--line); border-radius: 10px; background: rgba(0,0,0,.22); color: var(--text);
      padding: 10px 11px; outline: none; font-size: .9rem;
    }
    input:focus, select:focus { border-color: rgba(251,191,36,.7); box-shadow: 0 0 0 3px rgba(251,191,36,.16); }
    .btn {
      border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; background: rgba(255,255,255,.05);
      color: var(--text); font-weight: 700; cursor: pointer; transition: .18s ease; text-decoration:none;
      display:inline-flex; align-items:center; justify-content:center; gap: 8px;
    }
    .btn:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.2); }

    .table-wrap { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 960px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,.08); text-align: left; vertical-align: top; }
    th { font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); background: rgba(16,19,28,.96); position: sticky; top: 0; z-index: 1; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 4px 10px; font-size: .74rem; font-weight: 700;
      border: 1px solid var(--line); background: rgba(255,255,255,.03);
    }
    .badge.aguardando_pagamento { color: #fcd34d; border-color: rgba(245,158,11,.45); background: rgba(245,158,11,.14); }
    .badge.em_processo { color: #fde68a; border-color: rgba(234,179,8,.38); background: rgba(234,179,8,.14); }
    .badge.concluido { color: #86efac; border-color: rgba(34,197,94,.38); background: rgba(34,197,94,.14); }
    .badge.entregue { color: #86efac; border-color: rgba(34,197,94,.38); background: rgba(34,197,94,.14); }
    .badge.erro { color: #fca5a5; border-color: rgba(239,68,68,.38); background: rgba(239,68,68,.14); }
    .badge.corrigido { color: #93c5fd; border-color: rgba(59,130,246,.35); background: rgba(59,130,246,.14); }
    .muted { color: var(--muted); font-size: .85rem; }
    .dev-reply { display: grid; gap: 8px; max-width: 360px; }
    .dev-reply-text { white-space: normal; word-break: break-word; line-height: 1.4; }
    .dev-reply-text a { color: #93c5fd; text-decoration: underline; word-break: break-all; }
    .btn-copy-reply {
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      color: #e5e7eb;
      padding: 6px 10px;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      justify-self: start;
    }
    .btn-copy-reply:hover { background: rgba(255,255,255,.1); }

    @media (max-width: 1080px) {
      .header { padding-right: 0; }
      .stats { grid-template-columns: 1fr; }
      .tools { grid-template-columns: 1fr; }
      .count { text-align: left; }
    }
    @media (max-width: 760px) {
      .sidebar { position: static; width: 100%; height: auto; }
      .main { margin-left: 0; padding: 16px; }
      .app { flex-direction: column; }
    }
      @media (max-width: 960px) {
      body.tp-sidebar-open .sidebar {
        transform: translateX(0) !important;
      }
    }
  </style>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <link rel="stylesheet" href="theme-white-green.css">
  <link rel="stylesheet" href="login-theme.css">
  <link rel="icon" type="image/png" href="https://i.ibb.co/bjgRWvLg/logo-2.png">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon"><i class="fas fa-bolt"></i></div>
          <div>
            <div class="brand-name">One Pay</div>
            <div class="brand-tag">ONE PAY</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="server-status">
          <div class="status-dot"></div>
          <div class="status-info">Servidor<br><span class="status-value">Online</span></div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="container">
        <div class="header">
          <h1 class="title">Histórico de Compras</h1>
          <div class="subtitle">Acompanhe recargas e pedidos do marketplace com status atualizado.</div>
        </div>

        <div id="status" class="status-box">Carregando...</div>

        <section class="stats">
          <article class="stat-card">
            <div class="stat-label">Total de compras</div>
            <div id="statCompras" class="stat-value">0</div>
          </article>
          <article class="stat-card">
            <div class="stat-label">Total investido</div>
            <div id="statValor" class="stat-value">R$ 0,00</div>
          </article>
          <article class="stat-card">
            <div class="stat-label">Ultima compra</div>
            <div id="statUltima" class="stat-value" style="font-size:1rem;">-</div>
          </article>
        </section>

        <section class="card">
          <div class="card-head">
            <h2 class="card-title">Compras realizadas</h2>
            <button class="btn" id="btnRefresh" type="button"><i class="fas fa-rotate-right"></i> Atualizar</button>
          </div>
          <div class="card-body">
            <div class="tools">
              <input id="search" type="text" placeholder="Buscar por compra, item, telefone, operadora ou cliente">
              <select id="statusFilter">
                <option value="">Todos os status</option>
                <option value="aguardando_pagamento">Aguardando pagamento</option>
                <option value="em_processo">Em processo</option>
                <option value="entregue">Entregue</option>
                <option value="erro">Erro</option>
                <option value="corrigido">Corrigido</option>
              </select>
              <select id="periodFilter">
                <option value="all">Todo periodo</option>
                <option value="7">Ultimos 7 dias</option>
                <option value="30">Ultimos 30 dias</option>
                <option value="90">Ultimos 90 dias</option>
              </select>
              <div class="count" id="count">0 compra(s)</div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Tipo</th>
                    <th>Compra</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Comentário Dev</th>
                    <th>Data e hora</th>
                  </tr>
                </thead>
                <tbody id="bodyRows"></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const BASE = String(window.API_BASE || '').replace(/\/+$/, '');
      const RECARGAS_API = BASE + '/recargas-celular';
      const MARKETPLACE_API = BASE + '/marketplace/orders';
      const statusEl = document.getElementById('status');
      const bodyRows = document.getElementById('bodyRows');
      const countEl = document.getElementById('count');
      const searchEl = document.getElementById('search');
      const statusFilterEl = document.getElementById('statusFilter');
      const periodFilterEl = document.getElementById('periodFilter');
      const btnRefresh = document.getElementById('btnRefresh');
      const statComprasEl = document.getElementById('statCompras');
      const statValorEl = document.getElementById('statValor');
      const statUltimaEl = document.getElementById('statUltima');
      let cache = [];

      function setStatus(msg, kind) {
        statusEl.textContent = msg || '';
        statusEl.className = 'status-box' + (kind ? ' ' + kind : '');
      }

      function formatMoney(v) { return Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
      function formatDate(v) {
        if (!v) return '-';
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return '-';
        return d.toLocaleString('pt-BR');
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function linkifyText(value) {
        const safe = escapeHtml(String(value || '').replace(/\r\n/g, '\n'));
        return safe
          .replace(/(https?:\/\/[^\s<]+)/gi, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>')
          .replace(/\n/g, '<br>');
      }

      function renderDevReply(rawText) {
        const text = String(rawText || '').trim();
        if (!text) return '<span class="muted">-</span>';
        return `
          <div class="dev-reply">
            <div class="dev-reply-text">${linkifyText(text)}</div>
            <button class="btn-copy-reply" type="button" data-action="copy-reply" data-copy="${encodeURIComponent(text)}">
              <i class="fas fa-copy"></i> Copiar resposta
            </button>
          </div>
        `;
      }

      async function copyTextToClipboard(text) {
        const content = String(text || '');
        if (!content) return;
        if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
          await navigator.clipboard.writeText(content);
          return;
        }
        const temp = document.createElement('textarea');
        temp.value = content;
        temp.setAttribute('readonly', 'readonly');
        temp.style.position = 'fixed';
        temp.style.opacity = '0';
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        temp.remove();
      }

      function statusLabel(status) {
        const value = String(status || '').toLowerCase();
        if (value === 'aguardando_pagamento') return 'Aguardando pagamento';
        if (value === 'em_processo') return 'Em processo';
        if (value === 'entregue' || value === 'concluido') return 'Entregue';
        if (value === 'corrigido') return 'Corrigido';
        if (value === 'erro' || value === 'cancelado') return 'Erro';
        return value || '-';
      }

      function statusClass(status) {
        const value = String(status || '').toLowerCase();
        if (value === 'concluido') return 'concluido';
        if (value === 'cancelado') return 'erro';
        return value;
      }

      function statusBadge(status) {
        const value = statusClass(status);
        return `<span class="badge ${value || 'aguardando_pagamento'}">${escapeHtml(statusLabel(status))}</span>`;
      }

      function getCompraLabel(item) {
        if (item.tipo === 'marketplace') {
          const items = Array.isArray(item.items) ? item.items : [];
          const resumo = items.map((x) => `${x.nome || 'Item'} x${Number(x.quantidade || 0)}`).join(', ');
          return resumo || 'Pedido marketplace';
        }
        const op = item.operadora || '-';
        const num = item.numero || '-';
        const credito = Number.isFinite(Number(item.valor_credito)) && Number(item.valor_credito) > 0
          ? ` - crédito R$ ${formatMoney(item.valor_credito)}`
          : '';
        return `Recarga ${op} - ${num}${credito}`;
      }

      function getValorPago(item) {
        if (item.tipo === 'marketplace') return Number(item.total || 0);
        if (Number.isFinite(Number(item.valor_pago)) && Number(item.valor_pago) > 0) return Number(item.valor_pago);
        return Number(item.valor || 0);
      }

      async function fetchJson(url, options) {
        const r = await fetch(url, options || {});
        const p = await r.json().catch(() => ({}));
        if (!r.ok || !p || !p.success) throw new Error(p && p.error ? p.error : 'Erro na requisição');
        return p.data;
      }

      function normalizeData(recargas, pedidos) {
        const a = (Array.isArray(recargas) ? recargas : []).map((x) => ({ ...x, tipo: 'recarga' }));
        const b = (Array.isArray(pedidos) ? pedidos : []).map((x) => ({ ...x, tipo: 'marketplace' }));
        return a.concat(b).sort((x, y) => {
          const ax = Date.parse(String(x.created_at || x.updated_at || '')) || 0;
          const by = Date.parse(String(y.created_at || y.updated_at || '')) || 0;
          return by - ax;
        });
      }

      function applyFilters() {
        const term = String(searchEl.value || '').trim().toLowerCase();
        const status = String(statusFilterEl.value || '').trim().toLowerCase();
        const period = String(periodFilterEl.value || 'all');
        const now = Date.now();
        const days = period === 'all' ? 0 : Number(period);
        const minTs = days > 0 ? (now - (days * 24 * 60 * 60 * 1000)) : 0;

        const list = cache.filter((item) => {
          const currentStatus = String(item.status || '').toLowerCase();
          const statusOk = !status
            || currentStatus === status
            || (status === 'entregue' && currentStatus === 'concluido')
            || (status === 'erro' && currentStatus === 'cancelado');
          const ts = Date.parse(String(item.created_at || item.updated_at || ''));
          const periodOk = !minTs || (Number.isFinite(ts) && ts >= minTs);
          const hay = [
            getCompraLabel(item),
            item.operadora || '',
            item.numero || '',
            item.cliente_nome || '',
            item.comentario_desenvolvedor || ''
          ].join(' ').toLowerCase();
          const textOk = !term || hay.includes(term);
          return statusOk && periodOk && textOk;
        });
        renderRows(list, cache.length);
      }

      function renderRows(list, total) {
        const items = Array.isArray(list) ? list : [];
        countEl.textContent = `${items.length} de ${total} compra(s)`;
        const totalValor = items.reduce((acc, item) => acc + getValorPago(item), 0);
        statComprasEl.textContent = String(items.length);
        statValorEl.textContent = `R$ ${formatMoney(totalValor)}`;
        statUltimaEl.textContent = items.length ? formatDate(items[0].created_at || items[0].updated_at) : '-';

        if (!items.length) {
          bodyRows.innerHTML = '<tr><td colspan="7" class="muted">Nenhuma compra encontrada.</td></tr>';
          return;
        }
        bodyRows.innerHTML = items.map((item) => `
          <tr>
            <td>#${item.id}</td>
            <td>${item.tipo === 'marketplace' ? 'Marketplace' : 'Recarga celular'}</td>
            <td>${escapeHtml(getCompraLabel(item))}</td>
            <td>R$ ${formatMoney(getValorPago(item))}</td>
            <td>${statusBadge(item.status)}</td>
            <td>${renderDevReply(item.comentario_desenvolvedor || '')}</td>
            <td>${formatDate(item.created_at || item.updated_at)}</td>
          </tr>
        `).join('');
      }

      async function loadAll() {
        const [recargas, pedidos] = await Promise.all([
          fetchJson(RECARGAS_API),
          fetchJson(MARKETPLACE_API)
        ]);
        cache = normalizeData(recargas, pedidos);
        applyFilters();
      }

      searchEl.addEventListener('input', applyFilters);
      statusFilterEl.addEventListener('change', applyFilters);
      periodFilterEl.addEventListener('change', applyFilters);
      bodyRows.addEventListener('click', async function (event) {
        const btn = event.target && event.target.closest ? event.target.closest('button[data-action="copy-reply"]') : null;
        if (!btn) return;
        try {
          await copyTextToClipboard(decodeURIComponent(String(btn.getAttribute('data-copy') || '')));
          setStatus('Resposta copiada.', 'ok');
        } catch (_) {
          setStatus('Falha ao copiar resposta.', 'error');
        }
      });

      btnRefresh.addEventListener('click', async function () {
        try {
          setStatus('Atualizando histórico...');
          await loadAll();
          setStatus('Histórico atualizado.', 'ok');
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao atualizar histórico.', 'error');
        }
      });

      (async function init() {
        try {
          setStatus('Carregando histórico de compras...');
          await loadAll();
          setStatus('Histórico carregado.', 'ok');
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao carregar histórico.', 'error');
        }
      })();
    })();
  </script>
</body>
</html>
