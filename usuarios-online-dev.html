<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UsuÃ¡rios Online (Dev) - One Pay</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0b0c10; --panel:#151821; --panel-soft:#10131c; --line:rgba(255,255,255,.12); --text:#f4f4f5; --muted:#a1a1aa; --ok:#22c55e; --danger:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:Inter,sans-serif; background:radial-gradient(1200px 650px at 10% 10%, #1a1f2b 0%, #0b0c10 56%); color:var(--text); min-height:100vh; }
    .app { display:flex; min-height:100vh; }
    .sidebar { width:260px; background:rgba(10,10,11,.95); backdrop-filter:blur(20px); border-right:1px solid rgba(255,255,255,.05); position:fixed; inset:0 auto 0 0; display:flex; flex-direction:column; z-index:100; }
    .sidebar-header { padding:24px; border-bottom:1px solid rgba(255,255,255,.05); }
    .brand { display:flex; gap:14px; align-items:center; }
    .brand-icon { width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; color:#111; font-size:22px; background:linear-gradient(135deg, #fbbf24 0%, #d97706 100%); box-shadow:0 0 32px rgba(251,191,36,.25); }
    .brand-name { font-size:1.25rem; font-weight:800; background:linear-gradient(135deg, #fbbf24 0%, #d97706 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .brand-tag { font-size:.65rem; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; font-weight:600; }
    .sidebar-nav { flex:1; padding:16px 12px; overflow-y:auto; }
    .sidebar-footer { padding:16px; border-top:1px solid rgba(255,255,255,.05); }
    .server-status { display:flex; gap:12px; align-items:center; padding:12px; border:1px solid rgba(255,255,255,.05); border-radius:12px; background:rgba(255,255,255,.02); }
    .status-dot { width:10px; height:10px; border-radius:50%; background:var(--ok); box-shadow:0 0 12px var(--ok); }
    .status-info { font-size:.75rem; color:var(--muted); }
    .status-value { font-size:.85rem; font-weight:700; color:var(--text); }
    .main { flex:1; margin-left:260px; padding:24px; }
    .container { max-width:1200px; margin:0 auto; }
    .header { margin-bottom:16px; padding-right:300px; }
    .title { margin:0; font-size:2rem; font-weight:800; letter-spacing:-0.02em; }
    .subtitle { margin-top:6px; color:var(--muted); }
    .status-box { min-height:44px; border:1px solid var(--line); border-radius:10px; display:flex; align-items:center; padding:0 12px; margin-bottom:14px; color:#d1d5db; background:rgba(255,255,255,.02); }
    .status-box.ok { border-color:rgba(34,197,94,.35); background:rgba(34,197,94,.09); color:#86efac; }
    .status-box.error { border-color:rgba(239,68,68,.35); background:rgba(239,68,68,.09); color:#fca5a5; }
    .stats { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap:10px; margin-bottom:14px; }
    .stat-card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
    .stat-label { color:var(--muted); font-size:.78rem; margin-bottom:4px; }
    .stat-value { font-size:1.35rem; font-weight:800; }
    .card { border:1px solid var(--line); border-radius:12px; background:var(--panel); overflow:hidden; box-shadow:0 10px 26px rgba(0,0,0,.24); }
    .card-head { padding:14px 16px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.02); display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .card-title { margin:0; font-size:1rem; font-weight:700; }
    .card-body { padding:14px 16px; background:var(--panel-soft); }
    .tools { display:grid; grid-template-columns: 1fr auto auto; gap:10px; align-items:center; margin-bottom:12px; }
    input { width:100%; border:1px solid var(--line); border-radius:10px; background:rgba(0,0,0,.22); color:var(--text); padding:10px 11px; outline:none; font-size:.9rem; }
    input:focus { border-color:rgba(251,191,36,.7); box-shadow:0 0 0 3px rgba(251,191,36,.16); }
    .btn { border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:rgba(255,255,255,.05); color:var(--text); font-weight:700; cursor:pointer; transition:.18s ease; display:inline-flex; align-items:center; justify-content:center; gap:8px; }
    .btn:hover { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.2); }
    .count { color:var(--muted); font-size:.85rem; }
    .table-wrap { width:100%; overflow-x:auto; }
    table { width:100%; border-collapse:collapse; min-width:760px; }
    th, td { padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.08); text-align:left; vertical-align:top; }
    th { font-size:.78rem; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); background:rgba(16,19,28,.96); position:sticky; top:0; z-index:1; }
    .online-badge { display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:4px 10px; font-size:.74rem; font-weight:700; border:1px solid rgba(34,197,94,.4); color:#86efac; background:rgba(34,197,94,.14); }
    .online-badge::before { content:''; width:8px; height:8px; border-radius:50%; background:#22c55e; box-shadow:0 0 8px #22c55e; }
    .muted { color:var(--muted); font-size:.85rem; }
    @media (max-width:1080px) { .header { padding-right:0; } .stats { grid-template-columns:1fr; } .tools { grid-template-columns: 1fr; } }
    @media (max-width:760px) { .sidebar { position:static; width:100%; height:auto; } .main { margin-left:0; padding:16px; } .app { flex-direction:column; } }
    @media (max-width:960px) { body.tp-sidebar-open .sidebar { transform:translateX(0) !important; } }
  </style>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <link rel="stylesheet" href="theme-white-green.css">
  <link rel="stylesheet" href="login-theme.css">
  <link rel="icon" type="image/png" href="onepay-icon.png">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon"><i class="fas fa-bolt"></i></div>
          <div>
            <div class="brand-name">One Pay</div>
            <div class="brand-tag">ONE PAY</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="server-status">
          <div class="status-dot"></div>
          <div class="status-info">Servidor<br><span class="status-value">Online</span></div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="container">
        <div class="header">
          <h1 class="title">UsuÃ¡rios Online (Dev)</h1>
          <div class="subtitle">Veja quem estÃ¡ com sessÃ£o ativa em tempo real.</div>
        </div>

        <div id="status" class="status-box">Carregando usuÃ¡rios online...</div>

        <section class="stats">
          <article class="stat-card">
            <div class="stat-label">Online agora</div>
            <div id="statOnline" class="stat-value">0</div>
          </article>
          <article class="stat-card">
            <div class="stat-label">Ãšltima atualizaÃ§Ã£o</div>
            <div id="statUpdated" class="stat-value" style="font-size:1rem;">-</div>
          </article>
          <article class="stat-card">
            <div class="stat-label">Auto atualizar</div>
            <div class="stat-value" style="font-size:1rem;">10s</div>
          </article>
        </section>

        <section class="card">
          <div class="card-head">
            <h2 class="card-title">SessÃµes ativas</h2>
            <button class="btn" id="btnRefresh" type="button"><i class="fas fa-rotate-right"></i> Atualizar</button>
          </div>
          <div class="card-body">
            <div class="tools">
              <input id="search" type="text" placeholder="Buscar por nome, e-mail ou telefone">
              <div id="count" class="count">0 online</div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Status</th>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                    <th>NÃ­vel</th>
                    <th>Ãšltimo ping</th>
                  </tr>
                </thead>
                <tbody id="rows"></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const authBase = String(window.AUTH_API_BASE || '').replace(/\/+$/, '');
      const statusEl = document.getElementById('status');
      const rowsEl = document.getElementById('rows');
      const countEl = document.getElementById('count');
      const searchEl = document.getElementById('search');
      const statOnlineEl = document.getElementById('statOnline');
      const statUpdatedEl = document.getElementById('statUpdated');
      const btnRefresh = document.getElementById('btnRefresh');
      let cache = [];
      let timer = null;

      function setStatus(msg, kind) {
        statusEl.textContent = msg || '';
        statusEl.className = 'status-box' + (kind ? ' ' + kind : '');
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formatDate(v) {
        if (!v) return '-';
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return '-';
        return d.toLocaleString('pt-BR');
      }

      async function fetchJson(path) {
        const r = await fetch(authBase + path);
        const p = await r.json().catch(() => ({}));
        if (!r.ok || !p || !p.success) {
          throw new Error(p && p.error ? p.error : (p && p.detail ? p.detail : 'Erro na requisiÃ§Ã£o'));
        }
        return p.data;
      }

      function applyFilter() {
        const term = String(searchEl.value || '').trim().toLowerCase();
        const rows = cache.filter((u) => {
          if (!term) return true;
          const hay = `${u.name || ''} ${u.email || ''} ${u.phone || ''}`.toLowerCase();
          return hay.includes(term);
        });
        renderRows(rows, cache.length);
      }

      function renderRows(users, total) {
        const list = Array.isArray(users) ? users : [];
        countEl.textContent = `${list.length} de ${total} online`;
        statOnlineEl.textContent = String(total);
        statUpdatedEl.textContent = formatDate(new Date().toISOString());

        if (!list.length) {
          rowsEl.innerHTML = '<tr><td colspan="6" class="muted">Nenhum usuÃ¡rio online agora.</td></tr>';
          return;
        }

        rowsEl.innerHTML = list.map((u) => `
          <tr>
            <td><span class="online-badge">Online</span></td>
            <td>${escapeHtml(u.name || '-')}</td>
            <td>${escapeHtml(u.email || '-')}</td>
            <td>${escapeHtml(u.phone || '-')}</td>
            <td>${escapeHtml(u.role || '-')}</td>
            <td>${formatDate(u.session_last_seen || u.updated_at)}</td>
          </tr>
        `).join('');
      }

      async function loadOnline() {
        const data = await fetchJson('/auth/users/online');
        cache = Array.isArray(data) ? data : [];
        applyFilter();
      }

      async function refresh() {
        try {
          await loadOnline();
          setStatus('UsuÃ¡rios online atualizados.', 'ok');
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao carregar usuÃ¡rios online.', 'error');
        }
      }

      searchEl.addEventListener('input', applyFilter);
      btnRefresh.addEventListener('click', refresh);

      (async function init() {
        if (!authBase) {
          setStatus('AUTH_API_BASE nÃ£o configurada.', 'error');
          return;
        }
        try {
          setStatus('Carregando usuÃ¡rios online...');
          await refresh();
          timer = setInterval(refresh, 10000);
        } catch (_) {
          // handled in refresh
        }
      })();

      window.addEventListener('beforeunload', function () {
        if (timer) clearInterval(timer);
      });
    })();
  </script>
</body>
</html>
