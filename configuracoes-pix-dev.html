<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações PIX (Dev) - One Pay</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c10;
      --panel: #151821;
      --panel-soft: #10131c;
      --line: rgba(255,255,255,.12);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #fbbf24;
      --accent-strong: #f59e0b;
      --ok: #22c55e;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background:
        radial-gradient(1100px 600px at 8% 8%, rgba(217, 119, 6, 0.18), transparent 48%),
        radial-gradient(900px 580px at 92% 92%, rgba(59, 130, 246, 0.14), transparent 50%),
        radial-gradient(1200px 650px at 10% 10%, #1a1f2b 0%, #0b0c10 56%);
      color: var(--text);
      min-height: 100vh;
    }
    .app { display:flex; min-height: 100vh; }
    .sidebar {
      width: 260px;
      background: rgba(10,10,11,.95);
      backdrop-filter: blur(18px);
      border-right: 1px solid rgba(255,255,255,.05);
      position: fixed;
      inset: 0 auto 0 0;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    .sidebar-header { padding:24px; border-bottom:1px solid rgba(255,255,255,.05); }
    .brand { display:flex; gap:14px; align-items:center; }
    .brand-icon {
      width: 48px; height:48px; border-radius: 14px;
      display:flex; align-items:center; justify-content:center;
      color:#111; font-size:22px;
      background: linear-gradient(135deg,#fbbf24 0%,#d97706 100%);
      box-shadow: 0 12px 28px rgba(245, 158, 11, .32);
    }
    .brand-name { font-size:1.25rem; font-weight:800; background: linear-gradient(135deg,#fbbf24 0%,#d97706 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .brand-tag { font-size:.65rem; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; font-weight:600; }
    .sidebar-nav { flex: 1; padding:16px 12px; overflow-y:auto; }
    .nav-section-title {
      font-size: .65rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: 0 12px;
      margin-bottom: 8px;
      margin-top: 16px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 4px;
      transition: .2s ease;
      font-weight: 600;
      cursor: pointer;
    }
    .nav-item:hover {
      color: var(--text);
      background: rgba(255,255,255,.05);
    }
    .nav-item.active {
      color: #111;
      background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
      box-shadow: 0 0 28px rgba(251,191,36,.25);
    }
    .nav-item i { width: 20px; font-size: 1.1rem; }
    .nav-item span { font-size: .9rem; }
    .sidebar-footer { padding:16px; border-top:1px solid rgba(255,255,255,.05); }
    .server-status { display:flex; gap:12px; align-items:center; padding:12px; border:1px solid rgba(255,255,255,.05); border-radius:12px; background: rgba(255,255,255,.02); }
    .status-dot { width:10px; height:10px; border-radius:50%; background:var(--ok); box-shadow:0 0 12px var(--ok); }
    .status-info { font-size:.75rem; color:var(--muted); }
    .status-value { font-size:.85rem; font-weight:700; color:var(--text); }

    .main { flex:1; margin-left:260px; padding:24px; }
    .container { max-width: 900px; margin: 0 auto; }
    .header { margin-bottom: 16px; padding-right: 300px; }
    .title { margin:0; font-size:2rem; font-weight:800; letter-spacing:-.02em; }
    .subtitle { margin-top:6px; color:var(--muted); max-width: 700px; }
    .status-box {
      min-height: 44px; border:1px solid var(--line); border-radius:10px; display:flex; align-items:center;
      padding:0 12px; margin-bottom:14px; color:#d1d5db; background: rgba(255,255,255,.02);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .status-box.ok { border-color: rgba(34,197,94,.35); background: rgba(34,197,94,.09); color:#86efac; }
    .status-box.error { border-color: rgba(239,68,68,.35); background: rgba(239,68,68,.09); color:#fca5a5; }
    .card {
      border:1px solid rgba(255,255,255,.14);
      border-radius:16px;
      background: linear-gradient(180deg, rgba(21,24,33,.92), rgba(16,19,28,.92));
      overflow:hidden;
      box-shadow: 0 20px 38px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
    }
    .card-head {
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      display:flex; justify-content:space-between; align-items:center; gap:8px;
    }
    .card-title { margin:0; font-size:1rem; font-weight:700; }
    .card-body { padding:14px 16px; background: var(--panel-soft); }
    .form-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    label { font-size:.84rem; font-weight:700; color:#e5e7eb; letter-spacing:.01em; }
    input, select {
      width:100%; border:1px solid var(--line); border-radius:10px; background:rgba(0,0,0,.22); color: var(--text);
      padding:11px 12px; outline:none; font-size:.92rem;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    input:hover, select:hover { border-color: rgba(255,255,255,.2); background: rgba(0,0,0,.3); }
    input:focus, select:focus { border-color: rgba(251,191,36,.75); box-shadow:0 0 0 3px rgba(251,191,36,.18), 0 10px 20px rgba(0,0,0,.2); }
    .btn {
      border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:rgba(255,255,255,.05);
      color: var(--text); font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }
    .btn:hover { background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.2); transform: translateY(-1px); }
    .btn-primary {
      border-color: transparent;
      color:#111;
      background: linear-gradient(180deg,var(--accent) 0%,var(--accent-strong) 100%);
      box-shadow: 0 12px 22px rgba(245,158,11,.26);
    }
    .btn-primary:hover { box-shadow: 0 16px 30px rgba(245,158,11,.33); }
    .hint {
      color: var(--muted);
      font-size:.82rem;
      margin-top:10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px dashed rgba(255,255,255,.16);
      background: rgba(255,255,255,.03);
      line-height: 1.45;
    }
    @media (max-width: 1080px) { .header { padding-right: 0; } }
    @media (max-width: 760px) {
      .sidebar { position: static; width:100%; height:auto; }
      .main { margin-left:0; padding:16px; }
      .app { flex-direction:column; }
      .form-grid { grid-template-columns: 1fr; }
      .title { font-size: 1.65rem; }
    }
      @media (max-width: 960px) {
      body.tp-sidebar-open .sidebar {
        transform: translateX(0) !important;
      }
    }
  </style>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <link rel="stylesheet" href="theme-white-green.css">
  <link rel="stylesheet" href="login-theme.css">
  <link rel="icon" type="image/png" href="https://i.ibb.co/bjgRWvLg/logo-2.png">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon"><i class="fas fa-bolt"></i></div>
          <div>
            <div class="brand-name">One Pay</div>
            <div class="brand-tag">ONE PAY</div>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="server-status">
          <div class="status-dot"></div>
          <div class="status-info">Servidor<br><span class="status-value">Online</span></div>
        </div>
      </div>
    </aside>
    <main class="main">
      <div class="container">
        <div class="header">
          <h1 class="title">Configurações PIX (Dev)</h1>
          <div class="subtitle">Defina a chave PIX usada no pagamento das recargas.</div>
        </div>
        <div id="status" class="status-box">Carregando...</div>
        <section class="card">
          <div class="card-head">
            <h2 class="card-title">Dados PIX</h2>
            <button id="btnSave" class="btn btn-primary" type="button"><i class="fas fa-save"></i> Salvar</button>
          </div>
          <div class="card-body">
            <div class="form-grid">
              <div class="field">
                <label for="pixKeyType">Tipo da chave PIX</label>
                <select id="pixKeyType">
                  <option value="cpf">CPF</option>
                  <option value="cnpj">CNPJ</option>
                  <option value="telefone">Telefone</option>
                  <option value="aleatoria">Chave aleatoria</option>
                </select>
              </div>
              <div class="field">
                <label for="pixKey">Chave PIX</label>
                <input id="pixKey" type="text" placeholder="Ex.: 82999158412">
              </div>
              <div class="field">
                <label for="merchantName">Nome do recebedor (max 25)</label>
                <input id="merchantName" type="text" placeholder="Ex.: ONE PAY">
              </div>
              <div class="field">
                <label for="merchantCity">Cidade (max 15)</label>
                <input id="merchantCity" type="text" placeholder="Ex.: ARAPIRACA">
              </div>
            </div>
            <div class="hint">A descricao da cobrança sera montada automaticamente com nome do cliente e valor selecionado da recarga.</div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script>
    (function () {
      const statusEl = document.getElementById('status');
      const btnSave = document.getElementById('btnSave');
      const pixKeyTypeEl = document.getElementById('pixKeyType');
      const pixKeyEl = document.getElementById('pixKey');
      const merchantNameEl = document.getElementById('merchantName');
      const merchantCityEl = document.getElementById('merchantCity');
      const API = String(window.API_BASE || '').replace(/\/+$/, '') + '/recargas-celular/pix-config';

      function setStatus(msg, kind) {
        statusEl.textContent = msg || '';
        statusEl.className = 'status-box' + (kind ? ' ' + kind : '');
      }

      async function fetchJson(url, options) {
        const r = await fetch(url, options || {});
        const p = await r.json().catch(() => ({}));
        if (!r.ok || !p || !p.success) throw new Error(p && p.error ? p.error : 'Erro na requisicao');
        return p.data;
      }

      function updatePixPlaceholder() {
        const type = String(pixKeyTypeEl.value || 'telefone');
        if (type === 'cpf') pixKeyEl.placeholder = 'Ex.: 12345678901';
        else if (type === 'cnpj') pixKeyEl.placeholder = 'Ex.: 12345678000199';
        else if (type === 'telefone') pixKeyEl.placeholder = 'Ex.: +5582999158412';
        else pixKeyEl.placeholder = 'Ex.: e2a1c8d2-1234-5678-9012-abcdef123456';
      }

      function normalizeKeyByType(type, raw) {
        const value = String(raw || '').trim();
        const t = String(type || 'telefone');
        if (t === 'cpf' || t === 'cnpj') return value.replace(/\D+/g, '');
        if (t === 'telefone') {
          const digits = value.replace(/\D+/g, '');
          if (!digits) return '';
          if (digits.length === 10 || digits.length === 11) return '+55' + digits;
          if (digits.length === 12 || digits.length === 13) return '+' + digits;
          return value;
        }
        return value;
      }

      async function loadConfig() {
        const cfg = await fetchJson(API);
        pixKeyTypeEl.value = cfg.pix_key_type || 'telefone';
        pixKeyEl.value = cfg.pix_key || '';
        merchantNameEl.value = cfg.pix_merchant_name || 'ONE PAY';
        merchantCityEl.value = cfg.pix_city || 'ARAPIRACA';
        updatePixPlaceholder();
      }

      async function saveConfig() {
        const keyType = String(pixKeyTypeEl.value || 'telefone');
        const payload = {
          pix_key_type: keyType,
          pix_key: normalizeKeyByType(keyType, pixKeyEl.value),
          pix_merchant_name: String(merchantNameEl.value || '').trim(),
          pix_city: String(merchantCityEl.value || '').trim()
        };
        if (!payload.pix_key) throw new Error('Informe a chave PIX.');
        const saved = await fetchJson(API, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        pixKeyTypeEl.value = saved.pix_key_type || payload.pix_key_type;
        pixKeyEl.value = saved.pix_key || payload.pix_key;
        merchantNameEl.value = saved.pix_merchant_name || payload.pix_merchant_name;
        merchantCityEl.value = saved.pix_city || payload.pix_city;
        updatePixPlaceholder();
      }

      pixKeyTypeEl.addEventListener('change', function () {
        pixKeyEl.value = normalizeKeyByType(pixKeyTypeEl.value, pixKeyEl.value);
        updatePixPlaceholder();
      });

      btnSave.addEventListener('click', async function () {
        btnSave.disabled = true;
        try {
          setStatus('Salvando configuração PIX...');
          await saveConfig();
          setStatus('Configuração PIX salva com sucesso.', 'ok');
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao salvar configuração PIX.', 'error');
        } finally {
          btnSave.disabled = false;
        }
      });

      (async function init() {
        const profile = window.authGetSessionProfile && window.authGetSessionProfile();
        if (!profile || String(profile.group || '').toLowerCase() !== 'desenvolvedor') {
          window.location.replace('index.html');
          return;
        }
        try {
          setStatus('Carregando configuração PIX...');
          await loadConfig();
          setStatus('Dados carregados.', 'ok');
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao carregar configuração PIX.', 'error');
        }
      })();
    })();
  </script>
</body>
</html>
