<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-slate-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha - One Pay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a'
            }
          }
        }
      }
    };
  </script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <link rel="stylesheet" href="login-theme.css">
  <link rel="icon" type="image/png" href="onepay-icon.png">
</head>
<body class="h-full bg-slate-950 text-slate-100">
  <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-sm text-center">
      <div class="login-brand login-brand--compact">
        <div class="brand-icon brand-icon--recover" aria-hidden="true"></div>
      </div>
      <h2 class="mt-10 text-center text-2xl font-bold tracking-tight text-white">Recuperar senha</h2>
      <p class="mt-2 text-sm text-slate-400">Informe seu e-mail para receber o link de redefinição.</p>
    </div>

    <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
      <div class="rounded-xl border border-white/10 bg-white/5 backdrop-blur-sm p-6 shadow-2xl">
        <div id="status" class="min-h-5 text-xs font-semibold text-slate-400 mb-4"></div>

        <div class="space-y-4">
          <div>
            <label for="recoverEmail" class="block text-sm/6 font-medium text-slate-100">E-mail cadastrado</label>
            <div class="mt-2">
              <input id="recoverEmail" type="email" autocomplete="email" placeholder="email@dominio.com" class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
            </div>
          </div>

          <button id="btnRequestResetCode" type="button" class="flex w-full justify-center rounded-md bg-brand-500 px-3 py-2 text-sm font-semibold text-white hover:bg-brand-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-500">Enviar link</button>
        </div>

        <p class="mt-5 text-xs text-slate-400">Se o e-mail existir na base, você receberá as instruções para redefinir a senha.</p>

        <p class="mt-6 text-center text-sm text-slate-400">
          Já tem conta?
          <a id="linkSignIn" class="font-semibold text-brand-400 hover:text-brand-300" href="login.html?mode=signin">Entrar</a>
        </p>
        <p class="mt-2 text-center text-sm text-slate-400">
          Ainda não tem conta?
          <a id="linkSignUp" class="font-semibold text-brand-400 hover:text-brand-300" href="login.html?mode=signup">Criar conta</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search || '');
      const next = params.get('next') || 'marketplace.html';
      const statusEl = document.getElementById('status');
      const recoverEmail = document.getElementById('recoverEmail');
      const btnRequest = document.getElementById('btnRequestResetCode');
      const linkSignIn = document.getElementById('linkSignIn');
      const linkSignUp = document.getElementById('linkSignUp');

      if (window.authIsLoggedIn && window.authIsLoggedIn()) {
        window.location.replace(next);
        return;
      }

      linkSignIn.href = 'login.html?mode=signin&next=' + encodeURIComponent(next);
      linkSignUp.href = 'login.html?mode=signup&next=' + encodeURIComponent(next);

      function setStatus(message, isError, isOk) {
        statusEl.textContent = message || '';
        statusEl.className = 'min-h-5 text-xs font-semibold mb-4 ' + (isError ? 'text-red-400' : isOk ? 'text-green-400' : 'text-slate-400');
      }

      btnRequest.addEventListener('click', async function () {
        const email = String(recoverEmail.value || '').trim();
        if (!email) {
          setStatus('Informe o e-mail cadastrado para recuperação.', true, false);
          return;
        }

        btnRequest.disabled = true;
        setStatus('Enviando link de recuperação...');

        try {
          if (!window.authRequestPasswordReset) throw new Error('Função de recuperação não disponível.');
          const data = await window.authRequestPasswordReset(email);
          setStatus(data && data.message ? data.message : 'Se o e-mail existir, o link foi enviado.', false, true);
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao solicitar recuperação.', true, false);
        } finally {
          btnRequest.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
