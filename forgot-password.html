<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha - Preço Certo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c10;
      --card: #151821;
      --line: rgba(255,255,255,.12);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #fbbf24;
      --danger: #ef4444;
      --ok: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Inter, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 600px at 10% 10%, #1a1f2b 0%, #0b0c10 55%);
    }
    .card {
      width: 100%;
      max-width: 620px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 28px 70px rgba(0,0,0,.35);
    }
    .title {
      margin: 0 0 6px;
      font-size: 32px;
      font-weight: 800;
    }
    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .status {
      min-height: 20px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }
    .recover-panel {
      margin-top: 8px;
      padding: 14px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 14px;
      background:
        radial-gradient(120% 90% at 0% 0%, rgba(59,130,246,.08), transparent 52%),
        rgba(255, 255, 255, 0.02);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
      display: grid;
      gap: 10px;
    }
    .recover-panel-title {
      font-size: 15px;
      font-weight: 800;
      color: #f8fafc;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    .field label {
      font-size: 13px;
      font-weight: 700;
      color: #e5e7eb;
    }
    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 13px;
      background: rgba(0,0,0,.25);
      color: var(--text);
      outline: none;
      font-size: 14px;
    }
    .field input:focus {
      border-color: rgba(251,191,36,.7);
      box-shadow: 0 0 0 3px rgba(251,191,36,.15);
    }
    .recover-btn {
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 12px;
      min-height: 50px;
      padding: 11px 12px;
      background: linear-gradient(180deg, rgba(30,41,59,.55), rgba(15,23,42,.42));
      color: #f8fafc;
      font-size: 34px;
      font-weight: 800;
      cursor: pointer;
      transition: all .2s ease;
    }
    .recover-btn:hover {
      border-color: rgba(251,191,36,.48);
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(0,0,0,.26);
    }
    .recover-btn:disabled { opacity: .72; cursor: not-allowed; transform: none; }
    .recover-hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    .actions {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }
    .action-line {
      padding: 10px 12px;
      border: 1px dashed rgba(255,255,255,.22);
      border-radius: 10px;
      background: rgba(255,255,255,.03);
      color: #e5e7eb;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .action-link {
      color: #fcd34d;
      font-weight: 800;
      text-decoration: underline;
      white-space: nowrap;
    }
    @media (max-width: 560px) {
      .title { font-size: 28px; }
      .action-line { flex-direction: column; align-items: flex-start; }
    }
  </style>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>
  <main class="card">
    <h1 class="title">Recuperar senha</h1>
    <p class="subtitle">Informe seu e-mail cadastrado para receber o link de redefinição.</p>

    <div id="status" class="status"></div>

    <section class="recover-panel">
      <div class="recover-panel-title">Recuperar senha</div>
      <div class="field">
        <label for="recoverEmail">E-mail cadastrado</label>
        <input id="recoverEmail" type="email" placeholder="email@dominio.com" autocomplete="email">
      </div>
      <button id="btnRequestResetCode" class="recover-btn" type="button">Enviar link</button>
      <div class="recover-hint">Enviaremos um link com código de redefinição para seu e-mail.</div>
    </section>

    <section class="actions">
      <div class="action-line">
        <span>Já tem conta?</span>
        <a id="linkSignIn" class="action-link" href="login.html?mode=signin">Entrar</a>
      </div>
      <div class="action-line">
        <span>Ainda não tem conta? Então crie a sua conta agora mesmo.</span>
        <a id="linkSignUp" class="action-link" href="login.html?mode=signup">Criar conta</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search || '');
      const next = params.get('next') || 'marketplace.html';
      const statusEl = document.getElementById('status');
      const recoverEmail = document.getElementById('recoverEmail');
      const btnRequest = document.getElementById('btnRequestResetCode');
      const linkSignIn = document.getElementById('linkSignIn');
      const linkSignUp = document.getElementById('linkSignUp');

      if (window.authIsLoggedIn && window.authIsLoggedIn()) {
        window.location.replace(next);
        return;
      }

      linkSignIn.href = 'login.html?mode=signin&next=' + encodeURIComponent(next);
      linkSignUp.href = 'login.html?mode=signup&next=' + encodeURIComponent(next);

      function setStatus(message, isError, isOk) {
        statusEl.textContent = message || '';
        statusEl.className = 'status' + (isError ? ' error' : '') + (isOk ? ' ok' : '');
      }

      btnRequest.addEventListener('click', async function () {
        const email = String(recoverEmail.value || '').trim();
        if (!email) {
          setStatus('Informe o e-mail cadastrado para recuperação.', true, false);
          return;
        }
        btnRequest.disabled = true;
        setStatus('Enviando link de recuperação...');
        try {
          if (!window.authRequestPasswordReset) throw new Error('Função de recuperação não disponível.');
          const data = await window.authRequestPasswordReset(email);
          setStatus(data && data.message ? data.message : 'Se o e-mail existir, o link foi enviado.', false, true);
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao solicitar recuperação.', true, false);
        } finally {
          btnRequest.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
