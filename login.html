<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso - Preco Certo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0c10;
      --card: #151821;
      --accent: #fbbf24;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --danger: #ef4444;
      --ok: #22c55e;
      --line: rgba(255, 255, 255, 0.12);
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(1200px 600px at 10% 10%, #1a1f2b 0%, #0b0c10 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 24px;
      margin: 0 0 8px;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }
    .status.flow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(34, 197, 94, 0.35);
      background: rgba(34, 197, 94, 0.12);
      color: #4ade80;
      font-weight: 600;
      animation: statusFadeIn 0.24s ease;
    }
    .status.flow::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 rgba(34, 197, 94, 0.75);
      animation: statusPulse 1s infinite;
      flex-shrink: 0;
    }
    .status.flow.done::before {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: transparent;
      box-shadow: none;
      animation: none;
      content: '✓';
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #4ade80;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid rgba(74, 222, 128, 0.6);
    }
    @keyframes statusPulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.65); }
      70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }
    @keyframes statusFadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    form { display: none; }
    form.active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      color: #e4e4e7;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      outline: none;
      font-size: 14px;
    }

    input:focus, select:focus {
      border-color: rgba(251, 191, 36, 0.7);
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.15);
    }

    .password-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .show-btn {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .remember input { width: auto; }

    .signup-callout {
      margin-top: 10px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px dashed rgba(251, 191, 36, 0.45);
      border-radius: 10px;
      background: rgba(251, 191, 36, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: #fef3c7;
    }

    .signup-callout .cta-btn {
      border: 0;
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--accent);
      color: #111;
      font-weight: 800;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    .signin-callout {
      margin-top: 10px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px dashed rgba(255, 255, 255, 0.25);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: #e4e4e7;
    }

    .signin-callout .cta-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: transparent;
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    .password-strength {
      margin-top: 8px;
    }

    .strength-bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0;
      transition: width 0.2s ease;
      background: #6b7280;
    }

    .strength-fill.s1 { width: 25%; background: #ef4444; }
    .strength-fill.s2 { width: 50%; background: #f59e0b; }
    .strength-fill.s3 { width: 75%; background: #fbbf24; }
    .strength-fill.s4 { width: 100%; background: #22c55e; }

    .strength-text {
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .submit {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px;
      background: var(--accent);
      color: #111;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }

    .submit[disabled] {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 620px) {
      .card { padding: 20px; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
  <script src="config.js"></script>
  <script src="auth.js"></script>
</head>
<body>
  <div class="card">
    <h1>Acesso</h1>
    <p>Entre com e-mail ou telefone e senha para acessar seu painel.</p>

    <div id="status" class="status"></div>

    <form id="signInForm" class="active" autocomplete="on">
      <div class="grid">
        <div class="field">
          <label for="identifier">E-mail ou telefone</label>
          <input id="identifier" name="identifier" type="text" placeholder="email@dominio.com ou +55999999999" required>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <div class="password-wrap">
            <input id="password" name="password" type="password" placeholder="Sua senha" autocomplete="current-password" required>
            <button class="show-btn" type="button" data-toggle="password">Ver</button>
          </div>
        </div>
      </div>

      <label class="remember">
        <input id="rememberMe" type="checkbox" checked>
        Manter conectado
      </label>

      <div class="signup-callout">
        <span>Ainda nao tem conta? Crie sua conta agora mesmo.</span>
        <button id="btnGoSignUp" class="cta-btn" type="button">Criar conta</button>
      </div>

      <button id="btnLogin" class="submit" type="submit">Entrar</button>
    </form>

    <form id="signUpForm" autocomplete="off">
      <div class="grid">
        <div class="field">
          <label for="nome">Nome</label>
          <input id="nome" name="nome" type="text" required>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" required>
          </div>
          <div class="field">
            <label for="telefone">Telefone</label>
            <input id="telefone" name="telefone" type="tel" placeholder="+55 (00) 00000-0000" required>
          </div>
        </div>

        <div class="field">
          <label for="senhaCadastro">Senha</label>
          <div class="password-wrap">
            <input id="senhaCadastro" name="senha" type="password" minlength="6" autocomplete="new-password" required>
            <button class="show-btn" type="button" data-toggle="senhaCadastro">Ver</button>
          </div>
          <div class="password-strength">
            <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
            <div id="strengthText" class="strength-text">Forca da senha: -</div>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="cep">CEP</label>
            <input id="cep" name="cep" type="text" placeholder="00000-000" required>
          </div>
          <div class="field">
            <label for="rua">Rua</label>
            <input id="rua" name="rua" type="text" required>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="cidade">Cidade</label>
            <input id="cidade" name="cidade" type="text" required>
          </div>
          <div class="field">
            <label for="estado">Estado (UF)</label>
            <input id="estado" name="estado" type="text" maxlength="2" placeholder="Ex: SP" required>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="sexo">Sexo</label>
            <select id="sexo" name="sexo" required>
              <option value="">Selecione</option>
              <option value="masculino">Masculino</option>
              <option value="feminino">Feminino</option>
            </select>
          </div>
        </div>
      </div>

      <button id="btnRegister" class="submit" type="submit">Criar usuario</button>

      <div class="signin-callout">
        <span>Ja tem conta? Entre agora.</span>
        <button id="btnGoSignIn" class="cta-btn" type="button">Entrar</button>
      </div>
    </form>

  </div>

  <script>
    (function () {
      if (window.AUTH_DISABLED === true) {
        window.location.replace('index.html');
        return;
      }

      const params = new URLSearchParams(window.location.search || '');
      const requestedNext = params.get('next');
      const next = requestedNext || 'index.html';

      if (window.authIsLoggedIn && window.authIsLoggedIn()) {
        window.location.replace(next);
        return;
      }

      const statusEl = document.getElementById('status');
      const signInForm = document.getElementById('signInForm');
      const signUpForm = document.getElementById('signUpForm');

      function setStatus(message, isError, isOk) {
        statusEl.textContent = message || '';
        statusEl.className = 'status' + (isError ? ' error' : '') + (isOk ? ' ok' : '');
      }

      function setFlowStatus(message, done) {
        statusEl.textContent = message || '';
        statusEl.className = 'status ok flow' + (done ? ' done' : '');
      }

      function wait(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      function setMode(mode) {
        const signin = mode !== 'signup';
        signInForm.classList.toggle('active', signin);
        signUpForm.classList.toggle('active', !signin);
      }

      document.getElementById('btnGoSignUp').addEventListener('click', function () {
        setMode('signup');
        setStatus('');
      });
      document.getElementById('btnGoSignIn').addEventListener('click', function () {
        setMode('signin');
        setStatus('');
      });

      const initialMode = params.get('mode') === 'signup' ? 'signup' : 'signin';
      setMode(initialMode);

      if (window.authPrewarm) {
        setStatus('Conectando ao servidor...');
        window.authPrewarm()
          .then(function () { setStatus(''); })
          .catch(function () { setStatus(''); });
      }

      document.querySelectorAll('[data-toggle]').forEach((btn) => {
        btn.addEventListener('click', function () {
          const targetId = btn.getAttribute('data-toggle');
          const input = document.getElementById(targetId);
          if (!input) return;
          const nextType = input.type === 'password' ? 'text' : 'password';
          input.type = nextType;
          btn.textContent = nextType === 'password' ? 'Ver' : 'Ocultar';
        });
      });

      function onlyDigits(value) {
        return String(value || '').replace(/\D+/g, '');
      }

      function formatCep(value) {
        const digits = onlyDigits(value).slice(0, 8);
        if (digits.length <= 5) return digits;
        return digits.slice(0, 5) + '-' + digits.slice(5);
      }

      function formatPhoneBr(value) {
        let digits = onlyDigits(value);
        if (digits.startsWith('55')) digits = digits.slice(2);
        digits = digits.slice(0, 11);

        const ddd = digits.slice(0, 2);
        const rest = digits.slice(2);
        const p1Len = rest.length > 8 ? 5 : 4;
        const p1 = rest.slice(0, p1Len);
        const p2 = rest.slice(p1Len, p1Len + 4);

        let text = '+55';
        if (ddd) text += ' (' + ddd;
        if (ddd.length === 2) text += ')';
        if (p1) text += ' ' + p1;
        if (p2) text += '-' + p2;
        return text;
      }

      function normalizePhoneForApi(value) {
        let digits = onlyDigits(value);
        if (digits.startsWith('55')) digits = digits.slice(2);
        if (digits.length < 10 || digits.length > 11) return null;
        return '55' + digits;
      }

      function normalizeCep(value) {
        const digits = onlyDigits(value);
        if (digits.length !== 8) return null;
        return digits;
      }

      async function buscarEnderecoPorCep(rawCep) {
        const cep = normalizeCep(rawCep);
        if (!cep) return null;

        const response = await fetch('https://viacep.com.br/ws/' + cep + '/json/');
        const data = await response.json().catch(() => null);
        if (!response.ok || !data || data.erro) return null;

        return {
          cep: cep,
          rua: data.logradouro || '',
          cidade: data.localidade || '',
          estado: (data.uf || '').toUpperCase()
        };
      }

      function calcPasswordStrength(password) {
        const p = String(password || '');
        let score = 0;
        if (p.length >= 8) score++;
        if (/[A-Z]/.test(p) && /[a-z]/.test(p)) score++;
        if (/\d/.test(p)) score++;
        if (/[^A-Za-z0-9]/.test(p) || p.length >= 12) score++;
        return Math.max(0, Math.min(4, score));
      }

      function strengthLabel(score) {
        if (score <= 1) return 'Fraca';
        if (score === 2) return 'Media';
        if (score === 3) return 'Boa';
        return 'Forte';
      }

      const telefoneInput = document.getElementById('telefone');
      if (telefoneInput) {
        telefoneInput.addEventListener('input', function () {
          telefoneInput.value = formatPhoneBr(telefoneInput.value);
        });
      }

      const cepInput = document.getElementById('cep');
      const ruaInput = document.getElementById('rua');
      const cidadeInput = document.getElementById('cidade');
      const estadoInput = document.getElementById('estado');
      if (cepInput) {
        cepInput.addEventListener('input', function () {
          cepInput.value = formatCep(cepInput.value);
        });

        cepInput.addEventListener('blur', async function () {
          const cepNormalizado = normalizeCep(cepInput.value);
          if (!cepNormalizado) return;

          try {
            setStatus('Buscando endereco pelo CEP...');
            const endereco = await buscarEnderecoPorCep(cepNormalizado);
            if (!endereco) {
              setStatus('CEP nao encontrado. Preencha os campos manualmente.', true, false);
              return;
            }

            cepInput.value = formatCep(endereco.cep);
            if (ruaInput && !ruaInput.value.trim()) ruaInput.value = endereco.rua;
            if (cidadeInput && !cidadeInput.value.trim()) cidadeInput.value = endereco.cidade;
            if (estadoInput && !estadoInput.value.trim()) estadoInput.value = endereco.estado;
            setStatus('Endereco preenchido pelo CEP.', false, true);
          } catch (_) {
            setStatus('Nao foi possivel consultar o CEP agora. Preencha manualmente.', true, false);
          }
        });
      }

      const senhaCadastroInput = document.getElementById('senhaCadastro');
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');
      if (senhaCadastroInput && strengthFill && strengthText) {
        senhaCadastroInput.addEventListener('input', function () {
          const score = calcPasswordStrength(senhaCadastroInput.value);
          strengthFill.className = 'strength-fill' + (score > 0 ? ' s' + score : '');
          strengthText.textContent = 'Forca da senha: ' + (senhaCadastroInput.value ? strengthLabel(score) : '-');
        });
      }

      signInForm.addEventListener('submit', async function (event) {
        event.preventDefault();

        const btn = document.getElementById('btnLogin');
        const identifier = document.getElementById('identifier').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('rememberMe').checked;

        if (!identifier || !password) {
          setStatus('Preencha e-mail/telefone e senha.', true, false);
          return;
        }

        btn.disabled = true;
        setFlowStatus('Iniciando sessao...', false);

        try {
          await window.authLogin(identifier, password, remember);
          setFlowStatus('Acesso concluido com sucesso.', true);
          await wait(700);
          window.location.replace(next);
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao autenticar.', true, false);
        } finally {
          btn.disabled = false;
        }
      });

      signUpForm.addEventListener('submit', async function (event) {
        event.preventDefault();

        const btn = document.getElementById('btnRegister');
        const payload = {
          nome: document.getElementById('nome').value.trim(),
          email: document.getElementById('email').value.trim(),
          senha: document.getElementById('senhaCadastro').value,
          telefone: normalizePhoneForApi(document.getElementById('telefone').value),
          cep: normalizeCep(document.getElementById('cep').value),
          rua: document.getElementById('rua').value.trim(),
          cidade: document.getElementById('cidade').value.trim(),
          estado: document.getElementById('estado').value.trim().toUpperCase(),
          sexo: document.getElementById('sexo').value
        };

        payload.endereco = `${payload.rua} - ${payload.cidade}/${payload.estado} - CEP ${payload.cep || ''}`.trim();

        if (!payload.nome || !payload.email || !payload.senha || !payload.telefone || !payload.cep || !payload.rua || !payload.cidade || !payload.estado || !payload.sexo) {
          setStatus('Preencha todos os campos do cadastro. CEP, rua, cidade e estado sao obrigatorios.', true, false);
          return;
        }

        btn.disabled = true;
        setStatus('Criando usuario... (se o servidor estiver em hibernacao, pode levar ate 1 minuto)');

        try {
          await window.authRegister(payload);
          setStatus('Usuario criado com sucesso. Faca login agora.', false, true);
          setMode('signin');
          document.getElementById('identifier').value = payload.email;
          document.getElementById('password').focus();
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao criar usuario.', true, false);
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
