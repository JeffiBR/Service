<!DOCTYPE html>
<html lang="pt-BR" class="h-full bg-slate-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso - One Pay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a'
            }
          }
        }
      }
    };
  </script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <link rel="stylesheet" href="login-theme.css">
  <link rel="icon" type="image/png" href="onepay-icon.png">
</head>
<body class="h-full bg-slate-950 text-slate-100">
  <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
      <div class="login-brand">
        <div class="brand-icon brand-icon--hero" aria-hidden="true"></div>
      </div>
      <h2 id="loginTitle" class="mt-10 text-center text-2xl font-bold tracking-tight text-white">Entrar na sua conta</h2>
      <p id="loginSubtitle" class="mt-2 text-sm text-slate-400">Acesse com e-mail ou telefone</p>
    </div>

    <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-md">
      <div class="rounded-xl border border-white/10 bg-white/5 backdrop-blur-sm p-6 shadow-2xl">
        <div id="status" class="min-h-5 text-xs font-semibold text-slate-400 mb-4"></div>

        <form id="signInForm" class="space-y-4" autocomplete="on">
          <div>
            <label for="identifier" class="block text-sm font-medium text-slate-200">E-mail ou telefone</label>
            <div class="mt-2">
              <input id="identifier" type="text" name="identifier" required placeholder="email@dominio.com ou +55 (00) 00000-0000" class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
            </div>
          </div>

          <div>
            <div class="flex items-center justify-between">
              <label for="password" class="block text-sm font-medium text-slate-200">Senha</label>
              <button id="btnShowRecover" type="button" class="text-xs font-semibold text-brand-400 hover:text-brand-300">Esqueceu a senha?</button>
            </div>
            <div class="mt-2 grid grid-cols-[1fr_auto] gap-2">
              <input id="password" type="password" name="password" required autocomplete="current-password" placeholder="Sua senha" class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              <button class="rounded-md border border-white/15 bg-white/5 px-3 py-2 text-xs font-semibold text-slate-200 hover:bg-white/10" type="button" data-toggle="password">Ver</button>
            </div>
          </div>

          <label class="flex items-center gap-2 text-xs text-slate-400">
            <input id="rememberMe" type="checkbox" checked class="rounded border-white/20 bg-white/5 text-brand-500 focus:ring-brand-500" />
            Manter conectado
          </label>

          <button id="btnLogin" type="submit" class="flex w-full justify-center rounded-md bg-brand-500 px-3 py-2 text-sm font-semibold text-white hover:bg-brand-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-500">Entrar</button>

          <p class="text-center text-sm text-slate-400">
            Não tem conta?
            <button id="btnGoSignUp" type="button" class="font-semibold text-brand-400 hover:text-brand-300">Criar conta</button>
          </p>
        </form>

        <form id="signUpForm" class="hidden space-y-4" autocomplete="off">
          <div>
            <label for="nome" class="block text-sm font-medium text-slate-200">Nome</label>
            <div class="mt-2">
              <input id="nome" name="nome" type="text" required class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
            </div>
          </div>

          <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
            <div>
              <label for="email" class="block text-sm font-medium text-slate-200">E-mail</label>
              <div class="mt-2">
                <input id="email" name="email" type="email" required class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
            </div>
            <div>
              <label for="telefone" class="block text-sm font-medium text-slate-200">Telefone</label>
              <div class="mt-2">
                <input id="telefone" name="telefone" type="tel" placeholder="+55 (00) 00000-0000" required class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
            </div>
          </div>

          <div>
            <label for="senhaCadastro" class="block text-sm font-medium text-slate-200">Senha</label>
            <div class="mt-2 grid grid-cols-[1fr_auto] gap-2">
              <input id="senhaCadastro" name="senha" type="password" minlength="6" autocomplete="new-password" required class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              <button class="rounded-md border border-white/15 bg-white/5 px-3 py-2 text-xs font-semibold text-slate-200 hover:bg-white/10" type="button" data-toggle="senhaCadastro">Ver</button>
            </div>
            <div class="mt-2 h-2 w-full rounded-full bg-slate-700/70 overflow-hidden"><div id="strengthFill" class="h-full w-0 bg-slate-400 transition-all"></div></div>
            <div id="strengthText" class="mt-1 text-xs text-slate-400">Força da senha: -</div>
          </div>

          <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
            <div>
              <label for="cep" class="block text-sm font-medium text-slate-200">CEP</label>
              <div class="mt-2">
                <input id="cep" name="cep" type="text" placeholder="00000-000" required class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
            </div>
            <div>
              <label for="rua" class="block text-sm font-medium text-slate-200">Rua</label>
              <div class="mt-2">
                <input id="rua" name="rua" type="text" required class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
            <div>
              <label for="cidade" class="block text-sm font-medium text-slate-200">Cidade</label>
              <div class="mt-2">
                <input id="cidade" name="cidade" type="text" required class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
            </div>
            <div>
              <label for="estado" class="block text-sm font-medium text-slate-200">Estado (UF)</label>
              <div class="mt-2">
                <input id="estado" name="estado" type="text" maxlength="2" placeholder="Ex: SP" required class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500" />
              </div>
            </div>
          </div>

          <div>
            <label for="sexo" class="block text-sm font-medium text-slate-200">Sexo</label>
            <div class="mt-2">
              <select id="sexo" name="sexo" required class="block w-full rounded-md border border-white/15 bg-white/5 px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-brand-500">
                <option value="">Selecione</option>
                <option value="masculino">Masculino</option>
                <option value="feminino">Feminino</option>
              </select>
            </div>
          </div>

          <button id="btnRegister" type="submit" class="flex w-full justify-center rounded-md bg-brand-500 px-3 py-2 text-sm font-semibold text-white hover:bg-brand-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-500">Criar usuário</button>

          <p class="text-center text-sm text-slate-400">
            Já tem conta?
            <button id="btnGoSignIn" type="button" class="font-semibold text-brand-400 hover:text-brand-300">Entrar</button>
          </p>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function () {
      if (window.AUTH_DISABLED === true) {
        window.location.replace('marketplace.html');
        return;
      }

      const params = new URLSearchParams(window.location.search || '');
      const next = 'marketplace.html';
      const recoverEmailFromUrl = (params.get('recover_email') || params.get('email') || '').trim();
      const recoverCodeFromUrl = (params.get('recover_code') || params.get('code') || '').trim();
      if (recoverEmailFromUrl && recoverCodeFromUrl) {
        const resetParams = new URLSearchParams(window.location.search || '');
        if (!resetParams.get('recover')) resetParams.set('recover', '1');
        window.location.replace('reset-password.html?' + resetParams.toString());
        return;
      }

      if (window.authIsLoggedIn && window.authIsLoggedIn()) {
        window.location.replace(next);
        return;
      }

      const statusEl = document.getElementById('status');
      const signInForm = document.getElementById('signInForm');
      const signUpForm = document.getElementById('signUpForm');
      const loginTitle = document.getElementById('loginTitle');
      const loginSubtitle = document.getElementById('loginSubtitle');

      function setStatus(message, isError, isOk) {
        statusEl.textContent = message || '';
        statusEl.className = 'min-h-5 text-xs font-semibold mb-4 ' + (isError ? 'text-red-400' : isOk ? 'text-green-400' : 'text-slate-400');
      }

      function setFlowStatus(message, done) {
        setStatus((done ? '✓ ' : '') + (message || ''), false, true);
      }

      function wait(ms) {
        return new Promise(function (resolve) {
          setTimeout(resolve, ms);
        });
      }

      function setMode(mode) {
        const signin = mode !== 'signup';
        signInForm.classList.toggle('hidden', !signin);
        signUpForm.classList.toggle('hidden', signin);
        if (loginTitle) loginTitle.textContent = signin ? 'Entrar na sua conta' : 'Criar conta';
        if (loginSubtitle) loginSubtitle.textContent = signin
          ? 'Acesse com e-mail ou telefone'
          : 'Preencha os dados para cadastrar o usuário';
      }

      document.getElementById('btnGoSignUp').addEventListener('click', function () {
        setMode('signup');
        setStatus('');
      });
      document.getElementById('btnGoSignIn').addEventListener('click', function () {
        setMode('signin');
        setStatus('');
      });
      document.getElementById('btnShowRecover').addEventListener('click', function () {
        const nextTarget = params.get('next') || 'marketplace.html';
        window.location.href = 'forgot-password.html?next=' + encodeURIComponent(nextTarget);
      });

      const initialMode = params.get('mode') === 'signup' ? 'signup' : 'signin';
      setMode(initialMode);

      if (window.authPrewarm) {
        setStatus('Conectando ao servidor...');
        window.authPrewarm()
          .then(function () { setStatus(''); })
          .catch(function () { setStatus(''); });
      }

      document.querySelectorAll('[data-toggle]').forEach((btn) => {
        btn.addEventListener('click', function () {
          const targetId = btn.getAttribute('data-toggle');
          const input = document.getElementById(targetId);
          if (!input) return;
          const nextType = input.type === 'password' ? 'text' : 'password';
          input.type = nextType;
          btn.textContent = nextType === 'password' ? 'Ver' : 'Ocultar';
        });
      });

      function onlyDigits(value) {
        return String(value || '').replace(/\D+/g, '');
      }

      function formatCep(value) {
        const digits = onlyDigits(value).slice(0, 8);
        if (digits.length <= 5) return digits;
        return digits.slice(0, 5) + '-' + digits.slice(5);
      }

      function formatPhoneBr(value) {
        let digits = onlyDigits(value);
        if (digits.startsWith('55')) digits = digits.slice(2);
        digits = digits.slice(0, 11);

        const ddd = digits.slice(0, 2);
        const rest = digits.slice(2);
        const p1Len = rest.length > 8 ? 5 : 4;
        const p1 = rest.slice(0, p1Len);
        const p2 = rest.slice(p1Len, p1Len + 4);

        let text = '+55';
        if (ddd) text += ' (' + ddd;
        if (ddd.length === 2) text += ')';
        if (p1) text += ' ' + p1;
        if (p2) text += '-' + p2;
        return text;
      }

      function normalizePhoneForApi(value) {
        let digits = onlyDigits(value);
        if (digits.startsWith('55')) digits = digits.slice(2);
        if (digits.length < 10 || digits.length > 11) return null;
        return '55' + digits;
      }

      function normalizeCep(value) {
        const digits = onlyDigits(value);
        if (digits.length !== 8) return null;
        return digits;
      }

      async function buscarEnderecoPorCep(rawCep) {
        const cep = normalizeCep(rawCep);
        if (!cep) return null;

        const response = await fetch('https://viacep.com.br/ws/' + cep + '/json/');
        const data = await response.json().catch(() => null);
        if (!response.ok || !data || data.erro) return null;

        return {
          cep: cep,
          rua: data.logradouro || '',
          cidade: data.localidade || '',
          estado: (data.uf || '').toUpperCase()
        };
      }

      function calcPasswordStrength(password) {
        const p = String(password || '');
        let score = 0;
        if (p.length >= 8) score++;
        if (/[A-Z]/.test(p) && /[a-z]/.test(p)) score++;
        if (/\d/.test(p)) score++;
        if (/[^A-Za-z0-9]/.test(p) || p.length >= 12) score++;
        return Math.max(0, Math.min(4, score));
      }

      function strengthLabel(score) {
        if (score <= 1) return 'Fraca';
        if (score === 2) return 'Média';
        if (score === 3) return 'Boa';
        return 'Forte';
      }

      const telefoneInput = document.getElementById('telefone');
      if (telefoneInput) {
        telefoneInput.addEventListener('input', function () {
          telefoneInput.value = formatPhoneBr(telefoneInput.value);
        });
      }

      const cepInput = document.getElementById('cep');
      const ruaInput = document.getElementById('rua');
      const cidadeInput = document.getElementById('cidade');
      const estadoInput = document.getElementById('estado');
      if (cepInput) {
        cepInput.addEventListener('input', function () {
          cepInput.value = formatCep(cepInput.value);
        });

        cepInput.addEventListener('blur', async function () {
          const cepNormalizado = normalizeCep(cepInput.value);
          if (!cepNormalizado) return;

          try {
            setStatus('Buscando endereço pelo CEP...');
            const endereco = await buscarEnderecoPorCep(cepNormalizado);
            if (!endereco) {
              setStatus('CEP não encontrado. Preencha os campos manualmente.', true, false);
              return;
            }

            cepInput.value = formatCep(endereco.cep);
            if (ruaInput && !ruaInput.value.trim()) ruaInput.value = endereco.rua;
            if (cidadeInput && !cidadeInput.value.trim()) cidadeInput.value = endereco.cidade;
            if (estadoInput && !estadoInput.value.trim()) estadoInput.value = endereco.estado;
            setStatus('Endereço preenchido pelo CEP.', false, true);
          } catch (_) {
            setStatus('Não foi possível consultar o CEP agora. Preencha manualmente.', true, false);
          }
        });
      }

      const senhaCadastroInput = document.getElementById('senhaCadastro');
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');
      if (senhaCadastroInput && strengthFill && strengthText) {
        senhaCadastroInput.addEventListener('input', function () {
          const score = calcPasswordStrength(senhaCadastroInput.value);
          const widthMap = ['0%', '25%', '50%', '75%', '100%'];
          const colorMap = ['#94a3b8', '#ef4444', '#f59e0b', '#a3e635', '#22c55e'];
          strengthFill.style.width = widthMap[score];
          strengthFill.style.backgroundColor = colorMap[score];
          strengthText.textContent = 'Força da senha: ' + (senhaCadastroInput.value ? strengthLabel(score) : '-');
        });
      }

      signInForm.addEventListener('submit', async function (event) {
        event.preventDefault();

        const btn = document.getElementById('btnLogin');
        const identifier = document.getElementById('identifier').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('rememberMe').checked;

        if (!identifier || !password) {
          setStatus('Preencha e-mail/telefone e senha.', true, false);
          return;
        }

        btn.disabled = true;
        setFlowStatus('Iniciando sessão...', false);

        try {
          await window.authLogin(identifier, password, remember);
          setFlowStatus('Acesso concluído com sucesso.', true);
          await wait(700);
          window.location.replace(next);
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao autenticar.', true, false);
        } finally {
          btn.disabled = false;
        }
      });

      signUpForm.addEventListener('submit', async function (event) {
        event.preventDefault();

        const btn = document.getElementById('btnRegister');
        const payload = {
          nome: document.getElementById('nome').value.trim(),
          email: document.getElementById('email').value.trim(),
          senha: document.getElementById('senhaCadastro').value,
          telefone: normalizePhoneForApi(document.getElementById('telefone').value),
          cep: normalizeCep(document.getElementById('cep').value),
          rua: document.getElementById('rua').value.trim(),
          cidade: document.getElementById('cidade').value.trim(),
          estado: document.getElementById('estado').value.trim().toUpperCase(),
          sexo: document.getElementById('sexo').value
        };

        payload.endereco = `${payload.rua} - ${payload.cidade}/${payload.estado} - CEP ${payload.cep || ''}`.trim();

        if (!payload.nome || !payload.email || !payload.senha || !payload.telefone || !payload.cep || !payload.rua || !payload.cidade || !payload.estado || !payload.sexo) {
          setStatus('Preencha todos os campos do cadastro. CEP, rua, cidade e estado são obrigatórios.', true, false);
          return;
        }

        btn.disabled = true;
        setStatus('Criando usuário... (se o servidor estiver em hibernação, pode levar até 1 minuto)');

        try {
          await window.authRegister(payload);
          setStatus('Usuário criado com sucesso. Faça login agora.', false, true);
          setMode('signin');
          document.getElementById('identifier').value = payload.email;
          document.getElementById('password').focus();
        } catch (err) {
          setStatus(err && err.message ? err.message : 'Falha ao criar usuário.', true, false);
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
