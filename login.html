<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso - Preço Certo</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --primary-light: #d1fae5;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --danger: #ef4444;
      --success: #10b981;
      --radius-lg: 24px;
      --radius-md: 16px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      background-image: 
        radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
      position: relative;
    }

    /* Ícones Flutuantes de Streaming no Fundo */
    .bg-icons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .floating-icon {
      position: absolute;
      fill: var(--primary);
      opacity: 0.08;
      animation: float-bg 15s infinite linear;
    }

    @keyframes float-bg {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    .icon-1 { top: 10%; left: 10%; width: 60px; animation-duration: 12s; }
    .icon-2 { top: 20%; right: 15%; width: 80px; animation-duration: 18s; }
    .icon-3 { bottom: 15%; left: 15%; width: 70px; animation-duration: 14s; }
    .icon-4 { bottom: 10%; right: 10%; width: 50px; animation-duration: 16s; }
    .icon-5 { top: 50%; left: 5%; width: 40px; animation-duration: 20s; }
    .icon-6 { top: 45%; right: 5%; width: 90px; animation-duration: 22s; }

    .container {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 48px;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .container::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: var(--primary-light);
      opacity: 0.3;
      border-radius: 50%;
      z-index: 0;
    }

    .form-content {
      position: relative;
      z-index: 1;
    }

    .brand-header {
      text-align: center;
      margin-bottom: 32px;
    }

    /* Ícone Principal Melhorado */
    .brand-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #ffffff 0%, var(--primary-light) 100%);
      border-radius: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.2);
      border: 1px solid rgba(16, 185, 129, 0.1);
      position: relative;
      transition: transform 0.3s ease;
    }

    .brand-logo:hover {
      transform: translateY(-5px) rotate(2deg);
    }

    .brand-logo svg {
      width: 44px;
      height: 44px;
    }

    .layer-top { fill: var(--primary); animation: layer-float 3s infinite ease-in-out; }
    .layer-mid { fill: var(--primary-dark); opacity: 0.7; animation: layer-float 3s infinite ease-in-out 0.5s; }
    .layer-bot { fill: var(--primary-dark); opacity: 0.4; animation: layer-float 3s infinite ease-in-out 1s; }

    @keyframes layer-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .brand-header h2 {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .brand-header p {
      color: var(--text-muted);
      font-size: 15px;
    }

    .tabs {
      display: flex;
      background: var(--bg);
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      background: white;
      color: var(--primary-dark);
      box-shadow: var(--shadow-sm);
    }

    .status {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status.error {
      display: block;
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fee2e2;
    }

    .status.ok {
      display: block;
      background: #f0fdf4;
      color: var(--success);
      border: 1px solid #dcfce7;
    }

    .status.flow {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status.flow::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }

    form {
      display: none;
      flex-direction: column;
      gap: 20px;
    }

    form.active {
      display: flex;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper svg {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      fill: var(--text-muted);
      transition: all 0.3s ease;
    }

    input, select {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      transition: all 0.3s ease;
      background: white;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    input:focus + svg, .input-wrapper:focus-within svg {
      fill: var(--primary);
      transform: scale(1.1);
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--primary-dark);
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .password-toggle:hover {
      background: var(--primary-light);
    }

    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 14px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .remember-me input {
      width: 16px;
      height: 16px;
      padding: 0;
      cursor: pointer;
    }

    .forgot-password {
      color: var(--primary-dark);
      text-decoration: none;
      font-weight: 600;
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
    }

    .forgot-password:hover {
      text-decoration: underline;
    }

    .btn-submit {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-submit:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .btn-submit svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .switch-prompt {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .switch-prompt button {
      background: none;
      border: none;
      color: var(--primary-dark);
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
    }

    .switch-prompt button:hover {
      text-decoration: underline;
    }

    .password-strength {
      margin-top: 8px;
    }

    .strength-meter {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .strength-bar {
      height: 100%;
      width: 0;
      transition: all 0.3s ease;
    }

    .strength-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .s1 { width: 25%; background: #ef4444; }
    .s2 { width: 50%; background: #f59e0b; }
    .s3 { width: 75%; background: #10b981; }
    .s4 { width: 100%; background: #059669; }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .container {
        padding: 32px 24px;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Ícones de Streaming Flutuantes -->
  <div class="bg-icons">
    <svg class="floating-icon icon-1" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <svg class="floating-icon icon-2" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    <svg class="floating-icon icon-3" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    <svg class="floating-icon icon-4" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    <svg class="floating-icon icon-5" viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
    <svg class="floating-icon icon-6" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </div>

  <div class="container">
    <div class="form-content">
      <div class="brand-header">
        <div class="brand-logo">
          <!-- Ícone de Camadas (Layers) Redesenhado -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path class="layer-bot" d="M12 21.5L2 16.5L12 11.5L22 16.5L12 21.5Z"/>
            <path class="layer-mid" d="M12 16.5L2 11.5L12 6.5L22 11.5L12 16.5Z"/>
            <path class="layer-top" d="M12 11.5L2 6.5L12 1.5L22 6.5L12 11.5Z"/>
          </svg>
        </div>
        <h2 id="formTitle">Preço Certo</h2>
        <p id="formSubtitle">Acesse sua conta para continuar.</p>
      </div>

      <div class="tabs">
        <button id="modeSignIn" class="tab-btn active">Entrar</button>
        <button id="modeSignUp" class="tab-btn">Cadastrar</button>
      </div>

      <div id="status" class="status"></div>

      <!-- Formulário de Login -->
      <form id="signInForm" class="active">
        <div class="form-group">
          <label for="identifier">E-mail ou Telefone</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"></path></svg>
            <input id="identifier" type="text" placeholder="seu@email.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"></path></svg>
            <input id="password" type="password" placeholder="••••••••" required>
            <button type="button" class="password-toggle" data-toggle="password">Ver</button>
          </div>
        </div>

        <div class="options-row">
          <label class="remember-me">
            <input id="rememberMe" type="checkbox" checked>
            Manter conectado
          </label>
          <button type="button" id="btnShowRecover" class="forgot-password">Esqueci a senha</button>
        </div>

        <button id="btnLogin" type="submit" class="btn-submit">
          Entrar
          <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"></path></svg>
        </button>

        <p class="switch-prompt">
          Não tem uma conta? <button type="button" id="btnGoSignUp">Crie agora</button>
        </p>
      </form>

      <!-- Formulário de Cadastro -->
      <form id="signUpForm">
        <div class="form-group">
          <label for="nome">Nome Completo</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>
            <input id="nome" type="text" placeholder="Seu nome" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">E-mail</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"></path></svg>
              <input id="email" type="email" placeholder="exemplo@email.com" required>
            </div>
          </div>
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.88 3.79 5.23 6.67 6.67l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"></path></svg>
              <input id="telefone" type="tel" placeholder="+55 (00) 00000-0000" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="senhaCadastro">Senha</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"></path></svg>
            <input id="senhaCadastro" type="password" placeholder="Mínimo 6 caracteres" required>
            <button type="button" class="password-toggle" data-toggle="senhaCadastro">Ver</button>
          </div>
          <div class="password-strength">
            <div class="strength-meter"><div id="strengthFill" class="strength-bar"></div></div>
            <div id="strengthText" class="strength-text">Força da senha: -</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cep">CEP</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"></path></svg>
              <input id="cep" type="text" placeholder="00000-000" required>
            </div>
          </div>
          <div class="form-group">
            <label for="rua">Rua</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path></svg>
              <input id="rua" type="text" required>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cidade">Cidade</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24"><path d="M15 11V5l-3-3-3 3v2H3v14h18V11h-6zm-8 8H5v-2h2v2zm0-4H5v-2h2v2zm0-4H5V9h2v2zm6 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V9h2v2zm0-4h-2V5h2v2zm6 12h-2v-2h2v2zm0-4h-2v-2h2v2z"></path></svg>
              <input id="cidade" type="text" required>
            </div>
          </div>
          <div class="form-group">
            <label for="estado">Estado (UF)</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"></path></svg>
              <input id="estado" type="text" maxlength="2" placeholder="Ex: SP" required>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="sexo">Sexo</label>
          <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"></path></svg>
            <select id="sexo" required>
              <option value="">Selecione</option>
              <option value="masculino">Masculino</option>
              <option value="feminino">Feminino</option>
            </select>
          </div>
        </div>

        <button id="btnRegister" type="submit" class="btn-submit">
          Criar Conta
          <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"></path></svg>
        </button>

        <p class="switch-prompt">
          Já tem uma conta? <button type="button" id="btnGoSignIn">Entrar agora</button>
        </p>
      </form>

      <div class="footer">
        Desenvolvido por Jeferson &copy; 2026 Todos os direitos reservados.
      </div>
    </div>
  </div>

  <script>
    (function () {
      if (window.AUTH_DISABLED === true) {
        window.location.replace('marketplace.html');
        return;
      }

      const params = new URLSearchParams(window.location.search || '');
      const next = 'marketplace.html';
      
      const statusEl = document.getElementById('status');
      const signInForm = document.getElementById('signInForm');
      const signUpForm = document.getElementById('signUpForm');
      const modeSignInBtn = document.getElementById('modeSignIn');
      const modeSignUpBtn = document.getElementById('modeSignUp');
      const formSubtitle = document.getElementById('formSubtitle');

      function setStatus(message, isError, isOk) {
        statusEl.textContent = message || '';
        statusEl.className = 'status' + (isError ? ' error' : '') + (isOk ? ' ok' : '');
      }

      function setFlowStatus(message, done) {
        statusEl.textContent = message || '';
        statusEl.className = 'status ok flow' + (done ? ' done' : '');
      }

      function wait(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      function setMode(mode) {
        const isSignIn = mode !== 'signup';
        signInForm.classList.toggle('active', isSignIn);
        signUpForm.classList.toggle('active', !isSignIn);
        modeSignInBtn.classList.toggle('active', isSignIn);
        modeSignUpBtn.classList.toggle('active', !isSignIn);
        
        formSubtitle.textContent = isSignIn ? 'Acesse sua conta para continuar.' : 'Junte-se a milhares de usuários hoje.';
        setStatus('');
      }

      modeSignInBtn.addEventListener('click', () => setMode('signin'));
      modeSignUpBtn.addEventListener('click', () => setMode('signup'));
      document.getElementById('btnGoSignUp').addEventListener('click', () => setMode('signup'));
      document.getElementById('btnGoSignIn').addEventListener('click', () => setMode('signin'));

      document.getElementById('btnShowRecover').addEventListener('click', function () {
        const nextTarget = params.get('next') || 'marketplace.html';
        window.location.href = 'forgot-password.html?next=' + encodeURIComponent(nextTarget);
      });

      document.querySelectorAll('[data-toggle]').forEach((btn) => {
        btn.addEventListener('click', function () {
          const targetId = btn.getAttribute('data-toggle');
          const input = document.getElementById(targetId);
          if (!input) return;
          const isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          btn.textContent = isPassword ? 'Ocultar' : 'Ver';
        });
      });

      function onlyDigits(value) { return String(value || '').replace(/\D+/g, ''); }

      function formatCep(value) {
        const digits = onlyDigits(value).slice(0, 8);
        if (digits.length <= 5) return digits;
        return digits.slice(0, 5) + '-' + digits.slice(5);
      }

      function formatPhoneBr(value) {
        let digits = onlyDigits(value);
        if (digits.startsWith('55')) digits = digits.slice(2);
        digits = digits.slice(0, 11);
        const ddd = digits.slice(0, 2);
        const rest = digits.slice(2);
        const p1Len = rest.length > 8 ? 5 : 4;
        const p1 = rest.slice(0, p1Len);
        const p2 = rest.slice(p1Len, p1Len + 4);
        let text = '+55';
        if (ddd) text += ' (' + ddd + (ddd.length === 2 ? ')' : '');
        if (p1) text += ' ' + p1;
        if (p2) text += '-' + p2;
        return text;
      }

      const telefoneInput = document.getElementById('telefone');
      if (telefoneInput) {
        telefoneInput.addEventListener('input', () => { telefoneInput.value = formatPhoneBr(telefoneInput.value); });
      }

      const cepInput = document.getElementById('cep');
      if (cepInput) {
        cepInput.addEventListener('input', () => { cepInput.value = formatCep(cepInput.value); });
        
        cepInput.addEventListener('blur', async function () {
          const digits = onlyDigits(cepInput.value);
          if (digits.length !== 8) return;
          try {
            setStatus('Buscando endereço...', false, true);
            const res = await fetch(`https://viacep.com.br/ws/${digits}/json/`);
            const data = await res.json();
            if (data.erro) throw new Error();
            document.getElementById('rua').value = data.logradouro || '';
            document.getElementById('cidade').value = data.localidade || '';
            document.getElementById('estado').value = (data.uf || '').toUpperCase();
            setStatus('Endereço preenchido!', false, true);
          } catch {
            setStatus('CEP não encontrado. Preencha manualmente.', true, false);
          }
        });
      }

      const senhaCadastroInput = document.getElementById('senhaCadastro');
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');

      if (senhaCadastroInput) {
        senhaCadastroInput.addEventListener('input', function () {
          const p = senhaCadastroInput.value;
          let score = 0;
          if (p.length >= 8) score++;
          if (/[A-Z]/.test(p) && /[a-z]/.test(p)) score++;
          if (/\d/.test(p)) score++;
          if (/[^A-Za-z0-9]/.test(p) || p.length >= 12) score++;
          
          strengthFill.className = 'strength-bar' + (score > 0 ? ' s' + score : '');
          const labels = ['-', 'Fraca', 'Média', 'Boa', 'Forte'];
          strengthText.textContent = 'Força da senha: ' + (p ? labels[score] : '-');
        });
      }

      signInForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        const identifier = document.getElementById('identifier').value.trim();
        const password = document.getElementById('password').value;
        const remember = document.getElementById('rememberMe').checked;

        btn.disabled = true;
        setFlowStatus('Iniciando sessão...', false);

        try {
          if (window.authLogin) {
            await window.authLogin(identifier, password, remember);
            setFlowStatus('Acesso concluído!', true);
            await wait(700);
            window.location.replace(next);
          } else {
            throw new Error('Serviço de autenticação indisponível.');
          }
        } catch (err) {
          setStatus(err.message || 'Falha ao autenticar.', true, false);
          btn.disabled = false;
        }
      });

      signUpForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        const btn = document.getElementById('btnRegister');
        const payload = {
          nome: document.getElementById('nome').value.trim(),
          email: document.getElementById('email').value.trim(),
          senha: document.getElementById('senhaCadastro').value,
          telefone: '55' + onlyDigits(document.getElementById('telefone').value),
          cep: onlyDigits(document.getElementById('cep').value),
          rua: document.getElementById('rua').value.trim(),
          cidade: document.getElementById('cidade').value.trim(),
          estado: document.getElementById('estado').value.trim().toUpperCase(),
          sexo: document.getElementById('sexo').value
        };
        payload.endereco = `${payload.rua} - ${payload.cidade}/${payload.estado} - CEP ${payload.cep}`;

        btn.disabled = true;
        setStatus('Criando conta...');

        try {
          if (window.authRegister) {
            await window.authRegister(payload);
            setStatus('Conta criada! Redirecionando...', false, true);
            await wait(1000);
            setMode('signin');
            document.getElementById('identifier').value = payload.email;
          } else {
            throw new Error('Serviço de registro indisponível.');
          }
        } catch (err) {
          setStatus(err.message || 'Falha ao criar conta.', true, false);
        } finally {
          btn.disabled = false;
        }
      });

      const initialMode = params.get('mode') === 'signup' ? 'signup' : 'signin';
      setMode(initialMode);
    })();
  </script>
</body>
</html>
