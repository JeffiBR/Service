<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - Preço Certo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --primary-light: #d1fae5;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --danger: #ef4444;
      --success: #10b981;
      --radius-lg: 24px;
      --radius-md: 16px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      background-image: 
        radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
    }

    /* Ícones Flutuantes de Streaming no Fundo */
    .bg-icons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .floating-icon {
      position: absolute;
      fill: var(--primary);
      opacity: 0.05;
      animation: float-bg 15s infinite linear;
    }

    @keyframes float-bg {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    .icon-1 { top: 10%; left: 5%; width: 60px; animation-duration: 12s; }
    .icon-2 { top: 20%; right: 10%; width: 80px; animation-duration: 18s; }
    .icon-3 { bottom: 15%; left: 10%; width: 70px; animation-duration: 14s; }
    .icon-4 { bottom: 10%; right: 5%; width: 50px; animation-duration: 16s; }

    .app {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* Sidebar Moderna */
    .sidebar {
      width: 280px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--border);
      position: fixed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 32px 20px;
      transition: all 0.3s ease;
    }

    .sidebar-header {
      margin-bottom: 40px;
      text-align: center;
    }

    .brand-name {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary-dark);
      letter-spacing: -1px;
    }

    .nav-section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 24px 0 12px 12px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--text-main);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s ease;
      margin-bottom: 4px;
    }

    .nav-item i {
      width: 20px;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }

    .nav-item:hover {
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    .nav-item:hover i {
      color: var(--primary-dark);
    }

    .nav-item.active {
      background: var(--primary);
      color: white;
    }

    .nav-item.active i {
      color: white;
    }

    /* Main Content */
    .main {
      flex: 1;
      margin-left: 280px;
      padding: 40px;
    }

    .top-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .welcome-text h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .welcome-text p {
      color: var(--text-muted);
    }

    .top-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    /* Cards de Filtro e Busca */
    .filter-card {
      background: white;
      padding: 24px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      margin-bottom: 32px;
      display: grid;
      grid-template-columns: 1fr 200px auto;
      gap: 16px;
      align-items: center;
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-wrapper i {
      position: absolute;
      left: 16px;
      color: var(--text-muted);
    }

    input, select {
      width: 100%;
      padding: 12px 16px 12px 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      background: var(--bg);
      transition: all 0.3s ease;
    }

    select {
      padding-left: 16px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    /* Grid de Produtos */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: white;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: all 0.3s ease;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-xl);
      border-color: var(--primary);
    }

    .product-image {
      height: 200px;
      background: #f1f5f9;
      position: relative;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-card:hover .product-image img {
      transform: scale(1.1);
    }

    .product-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .product-info {
      padding: 20px;
    }

    .product-category {
      font-size: 12px;
      font-weight: 700;
      color: var(--primary-dark);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .product-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .product-price {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary-dark);
      margin-bottom: 16px;
    }

    .product-actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-outline {
      background: white;
      border: 1px solid var(--border);
      color: var(--text-main);
    }

    .btn-outline:hover {
      background: var(--bg);
      border-color: var(--primary);
    }

    /* Carrinho Flutuante */
    .cart-drawer {
      position: fixed;
      right: -400px;
      top: 0;
      width: 400px;
      height: 100vh;
      background: white;
      box-shadow: var(--shadow-xl);
      z-index: 1000;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      padding: 32px;
    }

    .cart-drawer.open {
      right: 0;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .cart-header h3 {
      font-size: 24px;
      font-weight: 800;
    }

    .close-cart {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
    }

    .cart-item {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .cart-item-img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      background: var(--bg);
    }

    .cart-item-info h4 {
      font-size: 14px;
      font-weight: 700;
    }

    .cart-item-info p {
      font-size: 14px;
      color: var(--primary-dark);
      font-weight: 700;
    }

    .cart-footer {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 2px solid var(--border);
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
    }

    /* Status Badges */
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .status-pago { background: var(--primary-light); color: var(--primary-dark); }
    .status-pendente { background: #fef3c7; color: #d97706; }

    @media (max-width: 1024px) {
      .sidebar { width: 80px; padding: 32px 10px; }
      .brand-name, .nav-item span, .nav-section-title { display: none; }
      .main { margin-left: 80px; }
      .nav-item { justify-content: center; }
    }

    @media (max-width: 768px) {
      .filter-card { grid-template-columns: 1fr; }
      .main { padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- Ícones de Streaming Flutuantes -->
  <div class="bg-icons">
    <svg class="floating-icon icon-1" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <svg class="floating-icon icon-2" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    <svg class="floating-icon icon-3" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
    <svg class="floating-icon icon-4" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>
  </div>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand-name">Preço Certo</div>
      </div>
      
      <nav class="sidebar-nav">
        <div class="nav-section-title">Menu</div>
        <a href="#" class="nav-item active">
          <i class="fas fa-store"></i>
          <span>Marketplace</span>
        </a>
        <a href="#" class="nav-item" id="navOrders">
          <i class="fas fa-shopping-bag"></i>
          <span>Meus Pedidos</span>
        </a>
        
        <div class="nav-section-title">Conta</div>
        <a href="login.html" class="nav-item" id="topLoginBtn">
          <i class="fas fa-user"></i>
          <span>Entrar</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <header class="top-header">
        <div class="welcome-text">
          <h1>Marketplace</h1>
          <p>Encontre os melhores produtos digitais aqui.</p>
        </div>
        <div class="top-actions">
          <button class="btn btn-outline" id="openCart">
            <i class="fas fa-shopping-cart"></i>
            <span id="cartCount">0</span> itens
          </button>
        </div>
      </header>

      <div id="statusBox" class="status-box" style="display:none;"></div>

      <!-- Filtros -->
      <section class="filter-card">
        <div class="search-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" id="search" placeholder="O que você está procurando?">
        </div>
        <select id="categoryFilter">
          <option value="">Todas as categorias</option>
        </select>
        <button class="btn btn-primary" id="btnRefresh">
          <i class="fas fa-sync-alt"></i>
        </button>
      </section>

      <!-- Grid de Produtos -->
      <div id="productsLoader" style="text-align:center; padding: 40px; display:none;">
        <i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary);"></i>
      </div>
      <section class="products-grid" id="products">
        <!-- Produtos serão inseridos aqui via JS -->
      </section>

      <!-- Seção de Pedidos (Oculta por padrão) -->
      <section id="ordersSection" style="display:none; margin-top: 48px;">
        <div class="welcome-text" style="margin-bottom: 24px;">
          <h2>Meus Pedidos</h2>
        </div>
        <div class="filter-card" style="display:block; overflow-x:auto;">
          <table style="width:100%; border-collapse:collapse;">
            <thead>
              <tr style="text-align:left; border-bottom:2px solid var(--border);">
                <th style="padding:12px;">ID</th>
                <th style="padding:12px;">Itens</th>
                <th style="padding:12px;">Total</th>
                <th style="padding:12px;">Status</th>
                <th style="padding:12px;">Data</th>
              </tr>
            </thead>
            <tbody id="ordersRows">
              <!-- Pedidos aqui -->
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Carrinho Drawer -->
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3>Seu Carrinho</h3>
      <button class="close-cart" id="closeCart">&times;</button>
    </div>
    <div class="cart-items" id="cartItems">
      <!-- Itens do carrinho aqui -->
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span id="cartTotal">R$ 0,00</span>
      </div>
      <button class="btn btn-primary" id="btnCheckout" style="width:100%; padding:16px;">
        Finalizar Compra
      </button>
    </div>
  </div>

  <script>
    (function() {
      const API = 'https://api.manus.im/v1'; // Exemplo de API
      const PIX_API = 'https://api.manus.im/v1/pix';
      
      let products = [];
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      let categories = [];

      // Elementos DOM
      const productsEl = document.getElementById('products');
      const searchEl = document.getElementById('search');
      const categoryFilterEl = document.getElementById('categoryFilter');
      const cartCountEl = document.getElementById('cartCount');
      const cartDrawer = document.getElementById('cartDrawer');
      const cartItemsEl = document.getElementById('cartItems');
      const cartTotalEl = document.getElementById('cartTotal');
      const openCartBtn = document.getElementById('openCart');
      const closeCartBtn = document.getElementById('closeCart');
      const btnCheckout = document.getElementById('btnCheckout');

      // Funções de UI
      function formatMoney(v) { return Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 }); }

      function renderProducts() {
        const term = searchEl.value.toLowerCase();
        const cat = categoryFilterEl.value;
        
        const filtered = products.filter(p => {
          const matchTerm = p.nome.toLowerCase().includes(term) || p.descricao.toLowerCase().includes(term);
          const matchCat = !cat || p.categoria === cat;
          return matchTerm && matchCat;
        });

        productsEl.innerHTML = filtered.map(p => `
          <article class="product-card">
            <div class="product-image">
              <img src="${p.imagem_url || 'https://via.placeholder.com/300'}" alt="${p.nome}">
              <span class="product-badge">Digital</span>
            </div>
            <div class="product-info">
              <div class="product-category">${p.categoria}</div>
              <h3 class="product-name">${p.nome}</h3>
              <div class="product-price">R$ ${formatMoney(p.valor)}</div>
              <div class="product-actions">
                <button class="btn btn-primary" onclick="addToCart(${p.id})">
                  <i class="fas fa-cart-plus"></i> Adicionar
                </button>
              </div>
            </div>
          </article>
        `).join('');
      }

      function renderCart() {
        cartCountEl.textContent = cart.reduce((acc, item) => acc + item.quantidade, 0);
        
        if (cart.length === 0) {
          cartItemsEl.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:40px;">Seu carrinho está vazio.</p>';
          cartTotalEl.textContent = 'R$ 0,00';
          return;
        }

        cartItemsEl.innerHTML = cart.map(item => {
          const p = products.find(x => x.id === item.product_id);
          if (!p) return '';
          return `
            <div class="cart-item">
              <img src="${p.imagem_url}" class="cart-item-img">
              <div class="cart-item-info">
                <h4>${p.nome}</h4>
                <p>${item.quantidade}x R$ ${formatMoney(p.valor)}</p>
                <button onclick="removeFromCart(${p.id})" style="background:none; border:none; color:var(--danger); font-size:12px; cursor:pointer; font-weight:700;">Remover</button>
              </div>
            </div>
          `;
        }).join('');

        const total = cart.reduce((acc, item) => {
          const p = products.find(x => x.id === item.product_id);
          return acc + (p ? p.valor * item.quantidade : 0);
        }, 0);
        cartTotalEl.textContent = `R$ ${formatMoney(total)}`;
      }

      window.addToCart = function(id) {
        const existing = cart.find(item => item.product_id === id);
        if (existing) {
          existing.quantidade++;
        } else {
          cart.push({ product_id: id, quantidade: 1 });
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
        cartDrawer.classList.add('open');
      };

      window.removeFromCart = function(id) {
        cart = cart.filter(item => item.product_id !== id);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
      };

      // Eventos
      openCartBtn.onclick = () => cartDrawer.classList.add('open');
      closeCartBtn.onclick = () => cartDrawer.classList.remove('open');
      searchEl.oninput = renderProducts;
      categoryFilterEl.onchange = renderProducts;

      // Simulação de Carga de Dados (Substituir por fetch real)
      async function init() {
        document.getElementById('productsLoader').style.display = 'block';
        // Simulando delay de rede
        await new Promise(r => setTimeout(r, 800));
        
        products = [
          { id: 1, nome: "Curso de Marketing Digital", categoria: "Cursos", valor: 297.00, descricao: "Aprenda as melhores estratégias.", imagem_url: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=500&q=80" },
          { id: 2, nome: "E-book: Gestão Financeira", categoria: "E-books", valor: 47.90, descricao: "Domine suas finanças.", imagem_url: "https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=500&q=80" },
          { id: 3, nome: "Template Dashboard Pro", categoria: "Templates", valor: 129.00, descricao: "Dashboard moderno em React.", imagem_url: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=500&q=80" },
          { id: 4, nome: "Mentoria VIP Individual", categoria: "Serviços", valor: 997.00, descricao: "Acelere seus resultados.", imagem_url: "https://images.unsplash.com/photo-1515187029135-18ee286d815b?w=500&q=80" }
        ];

        categories = [...new Set(products.map(p => p.categoria))];
        categoryFilterEl.innerHTML += categories.map(c => `<option value="${c}">${c}</option>`).join('');
        
        document.getElementById('productsLoader').style.display = 'none';
        renderProducts();
        renderCart();
      }

      init();
    })();
  </script>
</body>
</html>
